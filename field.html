<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ATRC · Field Launcher</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    padding: 32px 24px 24px;
  }

  .logo {
    font-size: 10px;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-align: center;
  }
  .logo span { color: #c55a11; }

  .subtitle {
    font-size: 9px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
  }

  /* Status row */
  .status {
    font-size: 10px;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 12px;
    min-height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c55a11;
    flex-shrink: 0;
    animation: pulse 1.2s infinite;
  }
  .dot.green { background: #4CAF50; animation: none; }
  .dot.red   { background: #c00000; animation: none; }
  .dot.idle  { background: #333; animation: none; }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.2; }
  }

  /* GPS box */
  .gps-box {
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    padding: 24px;
    width: 100%;
    margin-bottom: 12px;
  }

  .gps-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .gps-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.3;
    min-height: 56px;
    display: flex;
    align-items: center;
    word-break: break-all;
  }

  .gps-value.dim {
    font-size: 12px;
    font-weight: 400;
    color: #333;
    letter-spacing: 1px;
  }

  .gps-value.error-state {
    font-size: 12px;
    font-weight: 400;
    color: #c00000;
    line-height: 1.6;
  }

  .gps-accuracy {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    margin-top: 10px;
    min-height: 14px;
  }

  /* Buttons */
  .btn-launch {
    width: 100%;
    padding: 20px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    background: #c55a11;
    color: #fff;
    cursor: pointer;
    margin-bottom: 10px;
    text-decoration: none;
    display: block;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .btn-launch:active { background: #a04800; }
  .btn-launch.disabled {
    background: #1a1a1a;
    border: 1px solid #222;
    color: #2e2e2e;
    pointer-events: none;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn-sec {
    padding: 14px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #222;
    background: transparent;
    color: #555;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    font-family: Arial, sans-serif;
  }
  .btn-sec:active { color: #aaa; border-color: #555; }

  /* Map link */
  .map-link {
    display: block;
    padding: 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #1e1e1e;
    color: #444;
    text-decoration: none;
    text-align: center;
    margin-bottom: 32px;
  }
  .map-link:active { color: #888; }

  /* Scale */
  .scale-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .scale-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .scale-bar {
    width: 24px;
    height: 6px;
    flex-shrink: 0;
  }

  .scale-text {
    font-size: 10px;
    color: #444;
    flex: 1;
    letter-spacing: 1px;
  }

  .scale-ci {
    font-size: 10px;
    color: #333;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Footer */
  footer {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: #222;
    text-transform: uppercase;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #444;
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #aaa;
    text-align: center;
    z-index: 99;
    display: none;
  }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="logo">AT<span>RC</span></div>
<div class="subtitle">CI Field Data Collection</div>

<div class="status">
  <div class="dot idle" id="dot"></div>
  <span id="statusText">Tap to get location</span>
</div>

<div class="gps-box">
  <div class="gps-label">GPS Coordinates</div>
  <div class="gps-value dim" id="gpsValue">—</div>
  <div class="gps-accuracy" id="gpsAccuracy"></div>
</div>

<div class="gps-box" id="zoneBox">
  <div class="gps-label">Zone</div>
  <div class="gps-value dim" id="zoneValue">Loading zones…</div>
  <select class="btn-sec" id="zoneFallback" style="display:none; width:100%; margin-top:10px; padding:12px; font-family:Arial, sans-serif;"></select>
</div>

<a class="btn-launch disabled" id="btnLaunch" href="#" target="_blank">→ Open Field Form</a>

<div class="btn-row">
  <button class="btn-sec" onclick="getLocation()">↻ Get GPS</button>
  <button class="btn-sec" onclick="copyCoords()">⎘ Copy</button>
</div>

<button class="btn-launch" id="btnCheckStatus" style="background:#1a1a1a; border:1px solid #333; margin-top:0;" onclick="checkLatestStatus()">✓ Check my last submission</button>
<div class="gps-accuracy" id="statusCheckResult" style="text-align:center; margin-bottom:22px; min-height:32px;"></div>

<a class="map-link" href="https://xstat-art.github.io/architecturatemporis/ATRC_CI_Map.html" target="_blank">↗ View CI Map</a>

<div class="scale-title">CI Scale</div>

<div class="scale-row">
  <div class="scale-bar" style="background:#4B0082"></div>
  <div class="scale-text">No Chronity</div>
  <div class="scale-ci">0.00–0.30</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#c55a11"></div>
  <div class="scale-text">Low</div>
  <div class="scale-ci">0.30–0.50</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#C8A400"></div>
  <div class="scale-text">Moderate</div>
  <div class="scale-ci">0.50–0.70</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#C86400"></div>
  <div class="scale-text">High</div>
  <div class="scale-ci">0.70–0.85</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#8B0000"></div>
  <div class="scale-text">Deep Chronity</div>
  <div class="scale-ci">0.85–1.00</div>
</div>

<footer>Time is a building material · ATRC 2026</footer>

<div class="toast" id="toast"></div>

<script>
const FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSe45pgFLqXMaagHHn7W34oeogulfu9Z_dF9iKYa12eX1qlK8w/viewform';
const GPS_ENTRY = 'entry.1075279085';
const DATE_ENTRY = 'entry.129520481';
const TIME_ENTRY = 'entry.1974195465';
const ACCURACY_ENTRY = 'entry.958104268';
const ZONE_ENTRY = 'entry.1099121252';

// Тот же CSV, что читает ATRC_CI_Map.html для отрисовки зон — используем
// его же геометрию для автоопределения "в какой зоне сейчас стоит
// исследователь", без единого похода в WhatsApp за номером зоны.
const ZONES_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy8xKcJNvAidXuhUzITooZZtzXlyfoxZtX7_q5p7K9iptOtpWNjkV3oyTyDUvmDN4cdR_9JYcvyh2b/pub?gid=1462679093&single=true&output=csv';

// Web App (тот же doPost/doGet, что уже обслуживает сохранение зон) —
// нужен для кнопки "Check my last submission". Вставь сюда реальный
// /exec URL из Apps Script → Deploy → Manage deployments → Web app → Copy.
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby2nHTeZAL8_hgbxYdZphPU76HZPKX68KgDyJX2n5RcnWn7UhPcVJ2CobkMeSnjBUh2/exec';
const API_SECRET = 'hn-zones-secret-8k3f2m'; // должен совпадать с CONFIG.API_SECRET в .gs

let savedLat = null;
let savedLng = null;
let savedAccuracy = null;
let watchId  = null;
let zones = {};          // { zoneId: [[lat,lng], ...] }
let zonesLoaded = false;
let detectedZoneId = null;
let manualZoneId = null; // выбор из fallback-списка, если автоопределение не сработало

// ═══════════════════════════════════════════════════════════════
// АВТООПРЕДЕЛЕНИЕ ЗОНЫ ПО GPS — грузим геометрию зон в фоне сразу при
// открытии страницы (параллельно с определением GPS), и как только есть
// и то и другое — проверяем, в какой зоне физически стоит исследователь.
// Раньше номер зоны приходилось копировать вручную через WhatsApp — сам
// этот выход из вкладки и был причиной сегодняшних сбоев (Google Forms
// теряла pre-fill параметры при "Start over" после возврата).
// ═══════════════════════════════════════════════════════════════
function loadZones() {
  if (typeof Papa === 'undefined') { zonesLoaded = true; return; }
  Papa.parse(ZONES_CSV + '&t=' + Date.now(), {
    download: true, header: true, skipEmptyLines: true,
    complete: function(results) {
      results.data.forEach(function(row) {
        const zoneId = row['Zone_ID'];
        if (!zoneId) return;
        try {
          const geo = JSON.parse(row['Polygon_GeoJSON']);
          zones[zoneId] = geo.coordinates[0].slice(0, -1).map(function(c) { return [c[1], c[0]]; }); // [lng,lat]->[lat,lng]
        } catch (e) { /* геометрия не распарсилась — просто пропускаем эту зону */ }
      });
      zonesLoaded = true;
      populateZoneFallback();
      detectZone();
    },
    error: function() { zonesLoaded = true; updateZoneDisplay(); }
  });
}

// Стандартный ray-casting point-in-polygon. Работает с [lat,lng] как с
// плоскими координатами — на масштабе одного города погрешность от
// кривизны Земли пренебрежимо мала, пересчитывать в проекцию не нужно.
function pointInPolygon(lat, lng, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const yi = ring[i][0], xi = ring[i][1];
    const yj = ring[j][0], xj = ring[j][1];
    const intersect = ((yi > lat) !== (yj > lat)) &&
      (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function detectZone() {
  if (!zonesLoaded || savedLat === null) return;
  const lat = parseFloat(savedLat), lng = parseFloat(savedLng);
  detectedZoneId = null;
  for (const zid in zones) {
    if (pointInPolygon(lat, lng, zones[zid])) { detectedZoneId = zid; break; }
  }
  updateZoneDisplay();
}

function populateZoneFallback() {
  const sel = document.getElementById('zoneFallback');
  sel.innerHTML = '<option value="">— select zone manually —</option>';
  Object.keys(zones).forEach(function(zid) {
    const opt = document.createElement('option');
    opt.value = zid; opt.textContent = zid;
    sel.appendChild(opt);
  });
  sel.onchange = function() {
    manualZoneId = sel.value || null;
    updateZoneDisplay();
  };
}

function updateZoneDisplay() {
  const el = document.getElementById('zoneValue');
  const sel = document.getElementById('zoneFallback');
  const activeZone = detectedZoneId || manualZoneId;

  if (!zonesLoaded) {
    el.className = 'gps-value dim'; el.textContent = 'Loading zones…';
    sel.style.display = 'none';
  } else if (detectedZoneId) {
    el.className = 'gps-value'; el.textContent = detectedZoneId + ' ✓';
    sel.style.display = 'none';
  } else if (savedLat === null) {
    el.className = 'gps-value dim'; el.textContent = 'Waiting for GPS…';
    sel.style.display = 'none';
  } else if (manualZoneId) {
    el.className = 'gps-value'; el.textContent = manualZoneId + ' (manual)';
    sel.style.display = 'block';
  } else {
    el.className = 'gps-value error-state'; el.textContent = 'Outside known zones — pick manually below';
    sel.style.display = 'block';
  }
  refreshLaunchButton();
}

// ═══════════════════════════════════════════════════════════════
// ПРОВЕРКА ПОСЛЕДНЕГО ЗАМЕРА — после того как форма отправлена и
// исследователь вернулся на эту страницу, один тап показывает: дошли ли
// данные, с флагом или без, вместо того чтобы узнавать об этом только на
// следующий день при разборе таблицы.
// ═══════════════════════════════════════════════════════════════
function checkLatestStatus() {
  const el = document.getElementById('statusCheckResult');
  if (!WEBAPP_URL || WEBAPP_URL.indexOf('PASTE_') === 0) {
    el.textContent = 'Web App URL not configured yet';
    return;
  }
  el.textContent = 'Checking…';
  const url = WEBAPP_URL + '?action=latestStatus&secret=' + encodeURIComponent(API_SECRET) + '&sinceMinutes=5';
  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.ok) { el.textContent = '✗ ' + (data.error || 'Error'); return; }
    if (!data.found) { el.textContent = 'No submission found in the last 5 min'; return; }
    if (data.anomalyFlag) {
      el.textContent = '⚠ ' + data.objectName + ' — ' + data.anomalyFlag;
    } else {
      el.textContent = '✓ ' + data.objectName + ' added, CI ' + data.ci;
    }
  }).catch(function() { el.textContent = 'Network error — try again'; });
}

// Кнопка "Open Field Form" активируется только когда есть GPS —
// зона не обязательна для активации (если она вне известных зон,
// пусть исследователь всё равно отправит форму, просто без Zone_ID —
// это мягкий [ZONE_MISSING], а не блокировка), но если зона уже
// определена/выбрана — подставляем и её тоже.
function refreshLaunchButton() {
  if (savedLat === null) return;
  const coords = savedLat + ', ' + savedLng;

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  let url = FORM_BASE + '?usp=pp_url'
    + '&' + GPS_ENTRY + '=' + encodeURIComponent(coords)
    + '&' + DATE_ENTRY + '=' + encodeURIComponent(dateStr)
    + '&' + TIME_ENTRY + '=' + encodeURIComponent(timeStr)
    + '&' + ACCURACY_ENTRY + '=' + encodeURIComponent(savedAccuracy);

  const activeZone = detectedZoneId || manualZoneId;
  if (activeZone) {
    url += '&' + ZONE_ENTRY + '=' + encodeURIComponent(activeZone);
  }

  const btn = document.getElementById('btnLaunch');
  btn.href = url;
  btn.className = 'btn-launch';
}

function getLocation() {
  if (!navigator.geolocation) {
    setStatus('red', 'GPS not supported');
    showGpsError('Geolocation not supported by this browser.');
    return;
  }

  setStatus('orange', 'Detecting location…');
  document.getElementById('gpsValue').className = 'gps-value dim';
  document.getElementById('gpsValue').textContent = 'Searching…';
  document.getElementById('gpsAccuracy').textContent = '';
  document.getElementById('btnLaunch').className = 'btn-launch disabled';

  // Clear previous watch
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); }

  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);

      savedLat = lat;
      savedLng = lng;
      savedAccuracy = acc;

      const coords = lat + ', ' + lng;
      const el = document.getElementById('gpsValue');
      el.className = 'gps-value';
      el.textContent = coords;
      document.getElementById('gpsAccuracy').textContent = 'Accuracy: ±' + acc + ' m';

      detectZone();       // теперь, когда есть координаты, пробуем определить зону
      refreshLaunchButton();

      if (acc <= 20) {
        setStatus('green', 'Lock · ±' + acc + ' m');
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      } else if (acc <= 60) {
        setStatus('orange', 'Improving… ±' + acc + ' m');
      } else {
        setStatus('orange', 'Searching… ±' + acc + ' m');
      }
    },
    function(err) {
      const msgs = {
        1: 'Permission denied — allow location in browser',
        2: 'Position unavailable — go outside',
        3: 'Timeout — tap Get GPS again'
      };
      const msg = msgs[err.code] || 'Location error';
      setStatus('red', 'Error');
      showGpsError(msg);
    },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );
}

function showGpsError(msg) {
  const el = document.getElementById('gpsValue');
  el.className = 'gps-value error-state';
  el.textContent = msg;
}

function setStatus(color, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot';
  if (color === 'green')  dot.className = 'dot green';
  if (color === 'red')    dot.className = 'dot red';
  // orange = default animation
  document.getElementById('statusText').textContent = text;
}

function copyCoords() {
  if (!savedLat || !savedLng) {
    showToast('Get GPS first');
    return;
  }
  const text = savedLat + ', ' + savedLng;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function() { showToast('✓ Copied: ' + text); })
      .catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('✓ Copied: ' + text); }
  catch(e) { showToast('Select and copy manually'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

// Стартуем определение GPS СРАЗУ при открытии страницы, без ожидания
// клика — единственное, что реально требует тапа, это переход по кнопке
// "Open Field Form" после того как локация уже готова. Раньше запуск был
// условным (только если разрешение на геолокацию уже когда-то давалось) —
// теперь запускаем безусловно: браузер сам покажет системный запрос
// разрешения при первом использовании, а при повторных — определение
// стартует мгновенно без единого лишнего тапа.
getLocation();
loadZones();

// Экран не должен гаснуть/блокироваться посреди замера в поле (особенно
// на жаре, где телефон и так быстро уходит в сон) — лучшее, что можно
// сделать без нативного приложения: Screen Wake Lock API. Не критично,
// если браузер его не поддерживает — тогда просто ничего не происходит.
if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(function(){});
}

</script>
</body>
</html>
