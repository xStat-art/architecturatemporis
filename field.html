<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ATRC Field Launcher</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --panel-2:#1c1c1c;
    --line:#2a2a2a;
    --text:#f2f0ec;
    --muted:#9a958c;
    --orange:#c8650a;
    --orange-bright:#e8791a;
    --green:#3a8a4a;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}

  #map{position:fixed;inset:0;z-index:1;}

  .top-bar{
    position:fixed;top:0;left:0;right:0;z-index:500;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
    background:linear-gradient(180deg, rgba(10,10,10,.92), rgba(10,10,10,0));
    pointer-events:none;
  }
  .top-bar .brand{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .top-bar .brand b{color:var(--text);}
  .gps-pill{
    pointer-events:auto;
    display:flex;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:20px;padding:6px 12px;font-size:11px;color:var(--muted);
  }
  .gps-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
  .gps-dot.live{background:var(--green);box-shadow:0 0 0 0 rgba(58,138,74,.6);animation:pulse-dot 2s infinite;}
  @keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(58,138,74,.5);}70%{box-shadow:0 0 0 8px rgba(58,138,74,0);}100%{box-shadow:0 0 0 0 rgba(58,138,74,0);}}

  .zone-banner{
    position:fixed;top:54px;left:16px;right:16px;z-index:480;
    background:rgba(20,20,20,.92);border:1px solid var(--orange);
    border-radius:10px;padding:10px 14px;
    display:none;align-items:center;justify-content:space-between;gap:10px;
    backdrop-filter:blur(6px);
  }
  .zone-banner.show{display:flex;}
  .zone-banner .zname{font-size:13px;font-weight:600;color:var(--orange-bright);}
  .zone-banner .zsub{font-size:11px;color:var(--muted);margin-top:2px;}
  .zone-banner .zci{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}

  .dominant-toast{
    position:fixed;left:16px;right:16px;bottom:170px;z-index:490;
    background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--orange-bright);
    border-radius:10px;padding:12px 14px;
    display:none;
  }
  .dominant-toast.show{display:block;animation:slideup .25s ease-out;}
  @keyframes slideup{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .dominant-toast .dt-row{display:flex;justify-content:space-between;align-items:baseline;}
  .dominant-toast .dt-name{font-size:14px;font-weight:600;}
  .dominant-toast .dt-id{font-size:10px;color:var(--muted);font-family:monospace;margin-top:2px;}
  .dominant-toast .dt-mode{
    font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;
    padding:3px 8px;border-radius:5px;flex-shrink:0;margin-left:8px;
  }
  .dt-mode.audit{background:rgba(200,101,10,.18);color:var(--orange-bright);border:1px solid var(--orange);}
  .dt-mode.new{background:rgba(58,138,74,.18);color:#5cb96f;border:1px solid var(--green);}
  .dominant-toast .dt-ci{font-size:12px;color:var(--muted);margin-top:6px;}

  .bottom-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:500;
    background:linear-gradient(0deg, rgba(10,10,10,.97) 60%, rgba(10,10,10,.85));
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
  }
  .stats-row{
    display:flex;gap:10px;margin-bottom:12px;
  }
  .stat-box{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px 10px;text-align:center;
  }
  .stat-box .v{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
  .stat-box .l{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:2px;}

  .btn-row{display:flex;gap:10px;}
  .btn{
    flex:1;text-align:center;text-decoration:none;
    padding:13px 10px;border-radius:10px;font-size:13px;font-weight:600;
    border:1px solid var(--orange);color:var(--orange-bright);background:transparent;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn.primary{background:var(--orange);color:#0a0a0a;border-color:var(--orange);}

  .crosshair-btn{
    position:fixed;right:16px;bottom:175px;z-index:490;
    width:44px;height:44px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--text);
    font-size:18px;
  }

  .leaflet-control-attribution{display:none !important;}

  .pulse-marker{
    width:16px;height:16px;border-radius:50%;
    background:#4a9eff;border:2px solid #fff;
    box-shadow:0 0 0 0 rgba(74,158,255,.6);
    animation:pulse-loc 2s infinite;
  }
  @keyframes pulse-loc{0%{box-shadow:0 0 0 0 rgba(74,158,255,.55);}70%{box-shadow:0 0 0 16px rgba(74,158,255,0);}100%{box-shadow:0 0 0 0 rgba(74,158,255,0);}}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:8px;}
  .leaflet-popup-tip{background:var(--panel);}
  .popup-title{font-weight:700;font-size:13px;margin-bottom:4px;}
  .popup-id{font-family:monospace;font-size:10px;color:var(--muted);margin-bottom:6px;}
  .popup-ci{font-size:12px;}
  .popup-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--orange-bright);text-decoration:none;font-weight:600;}

  .loading-banner{
    position:fixed;top:54px;left:16px;right:16px;z-index:470;
    font-size:11px;color:var(--muted);text-align:center;
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
  <div class="brand">ATRC <b>Field</b></div>
  <div class="gps-pill"><span class="gps-dot" id="gpsDot"></span><span id="gpsLabel">Locating…</span></div>
</div>

<div class="loading-banner" id="loadingBanner">Loading registry…</div>

<div class="zone-banner" id="zoneBanner">
  <div>
    <div class="zname" id="zoneName">—</div>
    <div class="zsub" id="zoneSub">—</div>
  </div>
  <div class="zci" id="zoneCi">—</div>
</div>

<div class="dominant-toast" id="domToast">
  <div class="dt-row">
    <div>
      <div class="dt-name" id="domName">—</div>
      <div class="dt-id" id="domId">—</div>
    </div>
    <div class="dt-mode audit" id="domMode">AUDIT</div>
  </div>
  <div class="dt-ci" id="domCi">—</div>
</div>

<button class="crosshair-btn" id="centerBtn" title="Center on me">⌖</button>

<div class="bottom-sheet">
  <div class="stats-row">
    <div class="stat-box"><div class="v" id="statCount">–</div><div class="l">Objects loaded</div></div>
    <div class="stat-box"><div class="v" id="statNearest">–</div><div class="l">Nearest (m)</div></div>
    <div class="stat-box"><div class="v" id="statZoneCi">–</div><div class="l">Zone CI</div></div>
  </div>
  <div class="btn-row">
    <a class="btn primary" id="newObjBtn" href="https://forms.gle/B29DyntFByrk24xD8" target="_blank" rel="noopener">+ New object</a>
    <a class="btn" href="ATRC_CI_Map.html">View CI Map</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ====================== CONFIG ====================== */
const REGISTRY_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSEvYYY_XY88tuVBOXk2FYHabWAOLXZwSsvil5VD6_oZRdP1lm2YNSUt8eTQhn0kwq-61_c5BnOzqv9/pub?gid=1404791980&single=true&output=csv";
const ZONES_GEOJSON_URL = "zones.geojson"; // optional, falls back gracefully if absent
const FORM_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSe45pgFLqXMaagHHn7W34oeogulfu9Z_dF9iKYa12eX1qlK8w/viewform";
const GPS_ENTRY_ID = "entry.1075279085";
const PROXIMITY_M = 10;       // dominant highlight radius
const NEAREST_NEIGHBOR_M = 500; // fallback zone-by-proximity radius (no zones.geojson yet)

/* ====================== MAP INIT ====================== */
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([42.4531, 18.5375], 16); // Herceg Novi default
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains: 'abcd'
}).addTo(map);

/* ====================== HELPERS ====================== */
function ciToColor(ci){
  ci = Math.max(0, Math.min(1, ci || 0));
  const wl = 400 + ci * 300;
  return wavelengthToRgb(wl);
}
function wavelengthToRgb(wl){
  let r,g,b;
  if(wl>=380&&wl<440){r=-(wl-440)/(440-380);g=0;b=1;}
  else if(wl>=440&&wl<490){r=0;g=(wl-440)/(490-440);b=1;}
  else if(wl>=490&&wl<510){r=0;g=1;b=-(wl-510)/(510-490);}
  else if(wl>=510&&wl<580){r=(wl-510)/(580-510);g=1;b=0;}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/(645-580);b=0;}
  else if(wl>=645&&wl<=780){r=1;g=0;b=0;}
  else{r=0;g=0;b=0;}
  return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const headers = splitCsvLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim().length).map(line=>{
    const cells = splitCsvLine(line);
    const row = {};
    headers.forEach((h,i)=>row[h.trim()] = (cells[i]||'').trim());
    return row;
  });
}
function splitCsvLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===',' && !inQ){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}
function parseGPS(str){
  if(!str) return null;
  const parts = str.split(',').map(s=>parseFloat(s.trim()));
  if(parts.length<2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  return { lat: parts[0], lng: parts[1] };
}
function pointInPolygon(lat, lng, ring){
  // ring: array of [lng,lat]
  let inside = false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0], yi=ring[i][1], xj=ring[j][0], yj=ring[j][1];
    const intersect = ((yi>lat)!=(yj>lat)) && (lng < (xj-xi)*(lat-yi)/((yj-yi)||1e-12)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}

/* ====================== STATE ====================== */
let objects = [];      // {CP_ID, Object_name, Architect, CI, ZN_ID, lat, lng, marker}
let zones = null;      // geojson FeatureCollection or null
let zonePolygons = []; // {name, ring:[[lng,lat]...], ci, layer}
let userPos = null;
let activeZone = null;
let nearestDominant = null;

/* ====================== LOAD REGISTRY ====================== */
fetch(REGISTRY_CSV).then(r=>r.text()).then(text=>{
  const rows = parseCSV(text);
  objects = rows.map(r=>{
    const gps = parseGPS(r.GPS);
    if(!gps) return null;
    return {
      CP_ID: r.CP_ID, ZN_ID: r.ZN_ID, name: r.Object_name, architect: r.Architect,
      ci: parseFloat(r.CI) || 0, status: r.Status,
      lat: gps.lat, lng: gps.lng
    };
  }).filter(Boolean);

  document.getElementById('statCount').textContent = objects.length;
  document.getElementById('loadingBanner').style.display = 'none';

  if(objects.length){
    const bounds = L.latLngBounds(objects.map(o=>[o.lat,o.lng]));
    map.fitBounds(bounds.pad(0.3));
  }

  objects.forEach(o=>{
    const marker = L.circleMarker([o.lat,o.lng], {
      radius: 8, fillColor: ciToColor(o.ci), fillOpacity: 0.9,
      color:'#0a0a0a', weight:2
    }).addTo(map);
    marker.bindPopup(
      `<div class="popup-title">${o.name||'Unnamed object'}</div>`+
      `<div class="popup-id">${o.CP_ID||'—'}</div>`+
      `<div class="popup-ci">CI = ${o.ci.toFixed(3)} · ${o.architect||''}</div>`+
      (o.CP_ID ? `<a class="popup-link" href="passport.html?id=${o.CP_ID}">View Chrono-Passport →</a>` : '')
    );
    o.marker = marker;
  });
}).catch(err=>{
  document.getElementById('loadingBanner').textContent = 'Registry unavailable — showing map only.';
  console.error('Registry load failed', err);
});

/* ====================== LOAD ZONES (optional) ====================== */
fetch(ZONES_GEOJSON_URL).then(r=>{ if(!r.ok) throw new Error('no zones.geojson yet'); return r.json(); })
  .then(gj=>{
    zones = gj;
    zonePolygons = (gj.features||[]).map(f=>{
      const ring = f.geometry.type==='Polygon' ? f.geometry.coordinates[0] : f.geometry.coordinates[0][0];
      const layer = L.polygon(ring.map(c=>[c[1],c[0]]), {
        color: '#c8650a', weight:1.5, fillOpacity:0.06, dashArray:'4,4'
      }).addTo(map);
      return { name: f.properties.name || f.properties.ZN_ID || 'Zone', zn_id: f.properties.ZN_ID,
        ci: f.properties.CI_zone, ring, layer };
    });
  })
  .catch(()=>{ /* zones.geojson not yet created — fallback to nearest-neighbor mode */ });

/* ====================== USER LOCATION ====================== */
const userIcon = L.divIcon({ className:'', html:'<div class="pulse-marker"></div>', iconSize:[16,16] });
let userMarker = null;
let proximityCircle = null;

document.getElementById('centerBtn').addEventListener('click', ()=>{
  if(userPos) map.setView([userPos.lat, userPos.lng], 18);
});

if('geolocation' in navigator){
  navigator.geolocation.watchPosition(onPosition, onPosError, {
    enableHighAccuracy:true, maximumAge:3000, timeout:10000
  });
}else{
  document.getElementById('gpsLabel').textContent = 'GPS unsupported';
}

function onPosError(err){
  document.getElementById('gpsLabel').textContent = 'GPS error';
  document.getElementById('gpsDot').classList.remove('live');
}

function onPosition(pos){
  userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  document.getElementById('gpsDot').classList.add('live');
  document.getElementById('gpsLabel').textContent =
    `${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)} · ±${Math.round(pos.coords.accuracy)}m`;

  if(!userMarker){
    userMarker = L.marker([userPos.lat,userPos.lng], { icon:userIcon, zIndexOffset:1000 }).addTo(map);
    map.setView([userPos.lat,userPos.lng], 17);
  }else{
    userMarker.setLatLng([userPos.lat,userPos.lng]);
  }

  updateZoneStatus();
  updateNearestDominant();
  updateNewObjLink();
}

/* ====================== ZONE HIGHLIGHT ====================== */
function updateZoneStatus(){
  if(!userPos) return;
  let found = null;

  if(zonePolygons.length){
    for(const z of zonePolygons){
      if(pointInPolygon(userPos.lat, userPos.lng, z.ring)){ found = z; break; }
    }
  } else if(objects.length){
    // fallback: nearest-neighbor mode (no zones.geojson yet)
    const inRange = objects.filter(o => haversine(userPos.lat,userPos.lng,o.lat,o.lng) <= NEAREST_NEIGHBOR_M);
    if(inRange.length){
      const znId = inRange[0].ZN_ID;
      const sameZone = objects.filter(o=>o.ZN_ID===znId);
      const avgCi = sameZone.reduce((s,o)=>s+o.ci,0) / sameZone.length;
      found = { name: znId || 'Unnamed zone', ci: avgCi, fallback:true };
    }
  }

  zonePolygons.forEach(z=>{
    z.layer.setStyle({ fillOpacity: z===found ? 0.22 : 0.06, weight: z===found ? 2.5 : 1.5 });
  });

  activeZone = found;
  const banner = document.getElementById('zoneBanner');
  if(found){
    banner.classList.add('show');
    document.getElementById('zoneName').textContent = found.name + (found.fallback ? ' (nearest-neighbor)' : '');
    document.getElementById('zoneSub').textContent = 'You are inside this Chronity Zone';
    document.getElementById('zoneCi').textContent = (found.ci!=null && !isNaN(found.ci)) ? Number(found.ci).toFixed(3) : '—';
    document.getElementById('statZoneCi').textContent = (found.ci!=null && !isNaN(found.ci)) ? Number(found.ci).toFixed(2) : '–';
  }else{
    banner.classList.remove('show');
    document.getElementById('statZoneCi').textContent = '–';
  }
}

/* ====================== DOMINANT PROXIMITY ====================== */
function updateNearestDominant(){
  if(!userPos || !objects.length) return;
  let nearest = null, nearestDist = Infinity;
  objects.forEach(o=>{
    const d = haversine(userPos.lat,userPos.lng,o.lat,o.lng);
    if(d < nearestDist){ nearestDist = d; nearest = o; }
    o.marker.setStyle({ radius: d<=PROXIMITY_M ? 12 : 8, weight: d<=PROXIMITY_M ? 3 : 2 });
  });

  document.getElementById('statNearest').textContent = isFinite(nearestDist) ? Math.round(nearestDist) : '–';

  const toast = document.getElementById('domToast');
  if(nearest && nearestDist <= PROXIMITY_M){
    nearestDominant = nearest;
    toast.classList.add('show');
    document.getElementById('domName').textContent = nearest.name || 'Unnamed object';
    document.getElementById('domId').textContent = nearest.CP_ID || 'No CP_ID yet';
    document.getElementById('domCi').textContent = `CI = ${nearest.ci.toFixed(3)} · ${Math.round(nearestDist)}m away`;
    const modeEl = document.getElementById('domMode');
    if(nearest.CP_ID){
      modeEl.textContent = 'AUDIT';
      modeEl.className = 'dt-mode audit';
    }else{
      modeEl.textContent = 'NEW';
      modeEl.className = 'dt-mode new';
    }
  }else{
    nearestDominant = null;
    toast.classList.remove('show');
  }
}

/* ====================== FORM PREFILL ====================== */
function updateNewObjLink(){
  if(!userPos) return;
  const gpsVal = `${userPos.lat.toFixed(6)}, ${userPos.lng.toFixed(6)}`;
  const url = `${FORM_BASE}?usp=pp_url&${GPS_ENTRY_ID}=${encodeURIComponent(gpsVal)}`;
  document.getElementById('newObjBtn').href = url;
}
</script>
</body>
</html>
