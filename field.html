<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ATRC · Field</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --bg2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c55a11;
      --accent-dim: rgba(197,90,17,0.15);
      --text: #e8e8e8;
      --text-dim: #999;
      --text-bright: #fff;
      --green: #4caf50;
      --yellow: #f5a623;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'SF Mono', 'Menlo', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 32px;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-bright);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--accent);
    }

    .map-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 5px 10px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .map-link:hover { background: var(--accent-dim); }

    /* ── GPS BLOCK ── */
    .gps-block {
      margin: 20px 20px 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .gps-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.acquiring { background: var(--yellow); animation: pulse 1.2s infinite; }
    .status-dot.ready     { background: var(--green); }
    .status-dot.error     { background: #e53935; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 13px;
      color: var(--text-dim);
    }
    .status-text strong { color: var(--text); }

    .gps-coords {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .coords-value {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text-bright);
      letter-spacing: 0.03em;
      flex: 1;
      min-width: 0;
      word-break: break-all;
    }
    .coords-value.waiting { color: var(--text-dim); font-size: 13px; font-family: var(--font); }

    .coords-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      font-family: var(--font);
    }

    .btn-copy {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .btn-copy:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-copy.copied { border-color: var(--green); color: var(--green); }

    /* ── ACTION BUTTON ── */
    .btn-form {
      display: block;
      margin: 16px 20px 0;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 16px 20px;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: calc(100% - 40px);
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-form:hover { background: #a84c0e; }
    .btn-form.disabled {
      opacity: 0.45;
      pointer-events: none;
      cursor: default;
    }

    .btn-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      padding: 0 20px;
    }

    /* ── SECONDARY ACTIONS ── */
    .secondary-actions {
      margin: 20px 20px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-sec {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      padding: 11px 12px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-sec:hover { border-color: var(--text-dim); color: var(--text); }

    /* ── CI SCALE ── */
    .ci-scale {
      margin: 24px 20px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .ci-scale-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
    }

    .ci-bar {
      height: 6px;
      background: linear-gradient(to right,
        #7b2fff 0%,
        #2979ff 20%,
        #00c853 40%,
        #ffe600 60%,
        #ff9800 75%,
        #e53935 100%
      );
    }

    .ci-labels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 8px 10px 10px;
      gap: 2px;
    }

    .ci-label {
      text-align: center;
    }
    .ci-label-name {
      font-size: 9px;
      color: var(--text-dim);
      display: block;
      margin-bottom: 2px;
    }
    .ci-label-range {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--text-dim);
      opacity: 0.7;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: 24px 20px 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    footer em {
      font-style: normal;
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">AT<span>R</span>C · Field</div>
    <a class="map-link" href="https://architecturatemporis.com/ATRC_CI_Map.html" target="_blank">↗ CI Map</a>
  </header>

  <!-- GPS BLOCK -->
  <div class="gps-block">
    <div class="gps-status">
      <div class="status-dot acquiring" id="statusDot"></div>
      <div class="status-text" id="statusText">Acquiring GPS location…</div>
    </div>
    <div class="gps-coords">
      <div>
        <div class="coords-value waiting" id="coordsDisplay">Waiting for signal</div>
        <div class="coords-meta" id="coordsMeta"></div>
      </div>
      <button class="btn-copy" id="btnCopy" onclick="copyCoords()" disabled>Copy</button>
    </div>
  </div>

  <!-- PRIMARY ACTION -->
  <a class="btn-form disabled" id="btnForm" href="#" target="_blank">→ Open Field Form</a>
  <div class="btn-hint" id="btnHint">Waiting for GPS to prefill coordinates…</div>

  <!-- SECONDARY ACTIONS -->
  <div class="secondary-actions">
    <button class="btn-sec" onclick="refreshGPS()">↻ Refresh GPS</button>
    <a class="btn-sec" href="https://forms.gle/B29DyntFByrk24xD8" target="_blank">⎘ Form (no GPS)</a>
  </div>

  <!-- CI SCALE -->
  <div class="ci-scale">
    <div class="ci-scale-title">Chronity Index · Reference Scale</div>
    <div class="ci-bar"></div>
    <div class="ci-labels">
      <div class="ci-label">
        <span class="ci-label-name">No Chronity</span>
        <span class="ci-label-range">0.00–0.30</span>
      </div>
      <div class="ci-label">
        <span class="ci-label-name">Low</span>
        <span class="ci-label-range">0.30–0.50</span>
      </div>
      <div class="ci-label">
        <span class="ci-label-name">Moderate</span>
        <span class="ci-label-range">0.50–0.70</span>
      </div>
      <div class="ci-label">
        <span class="ci-label-name">High</span>
        <span class="ci-label-range">0.70–0.85</span>
      </div>
      <div class="ci-label">
        <span class="ci-label-name">Deep</span>
        <span class="ci-label-range">0.85–1.00</span>
      </div>
    </div>
  </div>

  <footer>
    <em>Understanding before change</em> · ATRC 2026
  </footer>

</div>

<script>
  // ── Config ──
  const FORM_BASE_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSe45pgFLqXMaagHHn7W34oeogulfu9Z_dF9iKYa12eX1qlK8w/viewform';
  const GPS_ENTRY_ID  = 'entry.1075279085';

  // ── State ──
  let currentCoords = null;
  let watchId = null;

  // ── Elements ──
  const dot     = document.getElementById('statusDot');
  const txt     = document.getElementById('statusText');
  const display = document.getElementById('coordsDisplay');
  const meta    = document.getElementById('coordsMeta');
  const btnCopy = document.getElementById('btnCopy');
  const btnForm = document.getElementById('btnForm');
  const btnHint = document.getElementById('btnHint');

  // ── GPS ──
  function startGPS() {
    if (!navigator.geolocation) {
      setError('Geolocation not supported');
      return;
    }
    watchId = navigator.geolocation.watchPosition(onSuccess, onError, {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 5000
    });
  }

  function onSuccess(pos) {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    const acc = Math.round(pos.coords.accuracy);
    currentCoords = `${lat}, ${lng}`;

    // Update UI
    dot.className = 'status-dot ready';
    txt.innerHTML = `<strong>GPS ready</strong> · ±${acc} m`;

    display.textContent = currentCoords;
    display.classList.remove('waiting');
    meta.textContent = `Accuracy: ±${acc} m`;

    btnCopy.disabled = false;
    btnCopy.classList.remove('copied');

    // Enable form button with prefill
    const prefillURL = `${FORM_BASE_URL}?${GPS_ENTRY_ID}=${encodeURIComponent(currentCoords)}`;
    btnForm.href = prefillURL;
    btnForm.classList.remove('disabled');
    btnHint.textContent = 'GPS coordinates will be prefilled in the form';
  }

  function onError(err) {
    const msgs = {
      1: 'Location access denied. Enable in browser settings.',
      2: 'Position unavailable. Move to open sky.',
      3: 'GPS timeout. Tap Refresh to retry.'
    };
    setError(msgs[err.code] || 'GPS error');
  }

  function setError(msg) {
    dot.className = 'status-dot error';
    txt.textContent = msg;
    display.textContent = 'GPS unavailable';
    display.classList.add('waiting');
    meta.textContent = '';
    btnCopy.disabled = true;

    // Fallback: enable form without GPS
    btnForm.href = 'https://forms.gle/B29DyntFByrk24xD8';
    btnForm.classList.remove('disabled');
    btnHint.textContent = 'No GPS — enter coordinates manually in the form';
  }

  function refreshGPS() {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    dot.className = 'status-dot acquiring';
    txt.textContent = 'Acquiring GPS location…';
    display.textContent = 'Waiting for signal';
    display.classList.add('waiting');
    meta.textContent = '';
    btnCopy.disabled = true;
    btnForm.classList.add('disabled');
    btnHint.textContent = 'Waiting for GPS to prefill coordinates…';
    currentCoords = null;
    startGPS();
  }

  function copyCoords() {
    if (!currentCoords) return;
    navigator.clipboard.writeText(currentCoords).then(() => {
      btnCopy.textContent = '✓ Copied';
      btnCopy.classList.add('copied');
      setTimeout(() => {
        btnCopy.textContent = 'Copy';
        btnCopy.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback for older iOS
      const el = document.createElement('textarea');
      el.value = currentCoords;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      btnCopy.textContent = '✓ Copied';
      btnCopy.classList.add('copied');
      setTimeout(() => {
        btnCopy.textContent = 'Copy';
        btnCopy.classList.remove('copied');
      }, 2000);
    });
  }

  // ── Init ──
  startGPS();
</script>
</body>
</html>
