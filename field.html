<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ATRC · Field Launcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    padding: 32px 24px 24px;
  }

  .logo {
    font-size: 10px;
    letter-spacing: 3px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 4px;
    text-align: center;
  }
  .logo span { color: #c55a11; }

  .subtitle {
    font-size: 9px;
    letter-spacing: 2px;
    color: #888888;      /* было #333 */
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
  }

  /* Status row */
  .status {
    font-size: 10px;
    letter-spacing: 2px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 12px;
    min-height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c55a11;
    flex-shrink: 0;
    animation: pulse 1.2s infinite;
  }
  .dot.green { background: #4CAF50; animation: none; }
  .dot.red   { background: #e04040; animation: none; }
  .dot.idle  { background: #666; animation: none; }   /* было #333 */

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.2; }
  }

  /* GPS box */
  .gps-box {
    background: #1a1a1a;
    border: 1px solid #444444;   /* было #2e2e2e */
    padding: 24px;
    width: 100%;
    margin-bottom: 12px;
  }

  .gps-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .gps-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.3;
    min-height: 56px;
    display: flex;
    align-items: center;
    word-break: break-all;
  }

  .gps-value.dim {
    font-size: 12px;
    font-weight: 400;
    color: #888888;      /* было #333 */
    letter-spacing: 1px;
  }

  .gps-value.error-state {
    font-size: 12px;
    font-weight: 400;
    color: #e04040;      /* было #c00000 */
    line-height: 1.6;
  }

  .gps-accuracy {
    font-size: 10px;
    color: #888888;      /* было #444 */
    letter-spacing: 1px;
    margin-top: 10px;
    min-height: 14px;
  }

  /* Buttons */
  .btn-launch {
    width: 100%;
    padding: 20px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    background: #c55a11;
    color: #fff;
    cursor: pointer;
    margin-bottom: 10px;
    text-decoration: none;
    display: block;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .btn-launch:active { background: #a04800; }
  .btn-launch.disabled {
    background: #1a1a1a;
    border: 1px solid #333;      /* было #222 */
    color: #555555;              /* было #2e2e2e */
    pointer-events: none;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn-sec {
    padding: 14px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #444444;   /* было #222 */
    background: transparent;
    color: #aaaaaa;              /* было #555 */
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    font-family: Arial, sans-serif;
  }
  .btn-sec:active { color: #fff; border-color: #888; }

  /* Map link — оранжевый */
  .map-link {
    display: block;
    padding: 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #c55a11;
    color: #c55a11;
    text-decoration: none;
    text-align: center;
    margin-bottom: 32px;
    transition: background 0.15s;
  }
  .map-link:active { background: #1a0d00; color: #e06820; }

  /* Scale */
  .scale-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: #888888;      /* было #333 */
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .scale-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .scale-bar {
    width: 24px;
    height: 6px;
    flex-shrink: 0;
  }

  .scale-text {
    font-size: 10px;
    color: #aaaaaa;      /* было #444 */
    flex: 1;
    letter-spacing: 1px;
  }

  .scale-ci {
    font-size: 10px;
    color: #888888;      /* было #333 */
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Footer */
  footer {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: #555555;      /* было #222 */
    text-transform: uppercase;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #555;      /* было #444 */
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #cccccc;              /* было #aaa */
    text-align: center;
    z-index: 99;
    display: none;
  }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="logo">AT<span>RC</span></div>
<div class="subtitle">CI Field Data Collection</div>

<div class="status">
  <div class="dot idle" id="dot"></div>
  <span id="statusText">Tap to get location</span>
</div>

<div class="gps-box">
  <div class="gps-label">GPS Coordinates</div>
  <div class="gps-value dim" id="gpsValue">—</div>
  <div class="gps-accuracy" id="gpsAccuracy"></div>
</div>

<a class="btn-launch disabled" id="btnLaunch" href="#" target="_blank">→ Open Field Form</a>

<div class="btn-row">
  <button class="btn-sec" onclick="getLocation()">↻ Get GPS</button>
  <button class="btn-sec" onclick="copyCoords()">⎘ Copy</button>
</div>

<a class="map-link" href="https://architecturatemporis.com/ATRC_CI_Map.html" target="_blank">↗ View CI Map</a>

<div class="scale-title">CI Scale</div>

<div class="scale-row">
  <div class="scale-bar" style="background:#4B0082"></div>
  <div class="scale-text">No Chronity</div>
  <div class="scale-ci">0.00–0.30</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#c55a11"></div>
  <div class="scale-text">Low</div>
  <div class="scale-ci">0.30–0.50</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#C8A400"></div>
  <div class="scale-text">Moderate</div>
  <div class="scale-ci">0.50–0.70</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#C86400"></div>
  <div class="scale-text">High</div>
  <div class="scale-ci">0.70–0.85</div>
</div>
<div class="scale-row">
  <div class="scale-bar" style="background:#8B0000"></div>
  <div class="scale-text">Deep Chronity</div>
  <div class="scale-ci">0.85–1.00</div>
</div>

<footer>Understanding before change · ATRC 2026</footer>

<div class="toast" id="toast"></div>

<script>
const FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSe45pgFLqXMaagHHn7W34oeogulfu9Z_dF9iKYa12eX1qlK8w/viewform';
const GPS_ENTRY = 'entry.1075279085';

let savedLat = null;
let savedLng = null;
let watchId  = null;

function getLocation() {
  if (!navigator.geolocation) {
    setStatus('red', 'GPS not supported');
    showGpsError('Geolocation not supported by this browser.');
    return;
  }

  setStatus('orange', 'Detecting location…');
  document.getElementById('gpsValue').className = 'gps-value dim';
  document.getElementById('gpsValue').textContent = 'Searching…';
  document.getElementById('gpsAccuracy').textContent = '';
  document.getElementById('btnLaunch').className = 'btn-launch disabled';

  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); }

  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);

      savedLat = lat;
      savedLng = lng;

      const coords = lat + ', ' + lng;
      const el = document.getElementById('gpsValue');
      el.className = 'gps-value';
      el.textContent = coords;
      document.getElementById('gpsAccuracy').textContent = 'Accuracy: ±' + acc + ' m';

      const url = FORM_BASE + '?usp=pp_url&' + GPS_ENTRY + '=' + encodeURIComponent(coords);
      const btn = document.getElementById('btnLaunch');
      btn.href = url;
      btn.className = 'btn-launch';

      if (acc <= 20) {
        setStatus('green', 'Lock · ±' + acc + ' m');
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      } else if (acc <= 60) {
        setStatus('orange', 'Improving… ±' + acc + ' m');
      } else {
        setStatus('orange', 'Searching… ±' + acc + ' m');
      }
    },
    function(err) {
      const msgs = {
        1: 'Permission denied — allow location in browser',
        2: 'Position unavailable — go outside',
        3: 'Timeout — tap Get GPS again'
      };
      const msg = msgs[err.code] || 'Location error';
      setStatus('red', 'Error');
      showGpsError(msg);
    },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );
}

function showGpsError(msg) {
  const el = document.getElementById('gpsValue');
  el.className = 'gps-value error-state';
  el.textContent = msg;
}

function setStatus(color, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot';
  if (color === 'green')  dot.className = 'dot green';
  if (color === 'red')    dot.className = 'dot red';
  document.getElementById('statusText').textContent = text;
}

function copyCoords() {
  if (!savedLat || !savedLng) {
    showToast('Get GPS first');
    return;
  }
  const text = savedLat + ', ' + savedLng;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function() { showToast('✓ Copied: ' + text); })
      .catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('✓ Copied: ' + text); }
  catch(e) { showToast('Select and copy manually'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

if (navigator.permissions) {
  navigator.permissions.query({name:'geolocation'}).then(function(r) {
    if (r.state === 'granted') getLocation();
  }).catch(function(){});
}
</script>
</body>
</html>
