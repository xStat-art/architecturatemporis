<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ATRC · GPS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .logo {
    font-size: 10px;
    letter-spacing: 3px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .logo span { color: #c55a11; }

  .status {
    font-size: 11px;
    letter-spacing: 2px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 24px;
    min-height: 16px;
  }

  .coords-box {
    background: #1a1a1a;
    border: 1px solid #444444;   /* было #2e2e2e */
    padding: 32px 24px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 20px;
    position: relative;
  }

  .coords-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #aaaaaa;      /* было #555 */
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .coords-value {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.3;
    word-break: break-all;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .coords-value.loading { color: #888888; font-size: 14px; font-weight: 400; letter-spacing: 2px; }  /* было #333 */
  .coords-value.error   { color: #e04040; font-size: 13px; font-weight: 400; }  /* было #c00000 */

  .accuracy {
    font-size: 10px;
    color: #888888;      /* было #444 */
    letter-spacing: 1px;
    margin-top: 12px;
    min-height: 14px;
  }

  .btn-copy {
    width: 100%;
    max-width: 340px;
    padding: 18px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid #666666;   /* было #333 */
    background: transparent;
    color: #cccccc;              /* было #888 */
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-copy:active,
  .btn-copy.copied {
    background: #c55a11;
    border-color: #c55a11;
    color: #fff;
  }

  .btn-copy:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-refresh {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid #444444;   /* было #222 */
    background: transparent;
    color: #888888;              /* было #444 */
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 48px;
  }

  .btn-refresh:active { color: #cccccc; border-color: #666; }

  .instruction {
    font-size: 11px;
    color: #888888;      /* было #333 */
    line-height: 1.8;
    max-width: 280px;
    letter-spacing: 0.3px;
  }

  .instruction strong { color: #cccccc; }  /* было #555 */

  .form-link {
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #888888;      /* было #333 */
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid #555555;   /* было #222 */
    padding-bottom: 2px;
    transition: color 0.2s;
  }

  .form-link:active { color: #c55a11; border-color: #c55a11; }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c55a11;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(0.8); }
  }
</style>
</head>
<body>

<div class="logo">AT<span>RC</span> · GPS Locator</div>

<div class="status" id="status">
  <span class="dot"></span>Requesting location...
</div>

<div class="coords-box">
  <div class="coords-label">GPS Coordinates</div>
  <div class="coords-value loading" id="coords">Waiting for GPS...</div>
  <div class="accuracy" id="accuracy"></div>
</div>

<button class="btn-copy" id="btnCopy" onclick="copyCoords()" disabled>
  📋 &nbsp; Copy Coordinates
</button>

<button class="btn-refresh" onclick="getLocation()">
  ↻ &nbsp; Refresh
</button>

<div class="instruction">
  <strong>How to use:</strong><br>
  1. Copy coordinates above<br>
  2. Open the ATRC form<br>
  3. Paste into <strong>GPS coordinates</strong> field
</div>

<a class="form-link" href="https://forms.gle/B29DyntFByrk24xD8" target="_blank">
  → Open ATRC Field Form
</a>

<script>
let currentCoords = null;

function getLocation() {
  document.getElementById('status').innerHTML = '<span class="dot"></span>Requesting location...';
  document.getElementById('status').style.color = '';
  document.getElementById('coords').className = 'coords-value loading';
  document.getElementById('coords').textContent = 'Waiting for GPS...';
  document.getElementById('accuracy').textContent = '';
  document.getElementById('btnCopy').disabled = true;

  if (!navigator.geolocation) {
    showError('Geolocation not supported by this browser.');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);

      currentCoords = `${lat}, ${lng}`;

      document.getElementById('coords').className = 'coords-value';
      document.getElementById('coords').textContent = currentCoords;
      document.getElementById('accuracy').textContent = `Accuracy: ±${acc} m`;
      document.getElementById('btnCopy').disabled = false;
      document.getElementById('status').innerHTML = '✓ &nbsp;Location found';
      document.getElementById('status').style.color = '#4CAF50';
    },
    function(err) {
      let msg = 'Location error.';
      if (err.code === 1) msg = 'Permission denied. Allow location access in browser settings.';
      if (err.code === 2) msg = 'Location unavailable. Try outdoors.';
      if (err.code === 3) msg = 'Timeout. Try again.';
      showError(msg);
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}

function showError(msg) {
  document.getElementById('coords').className = 'coords-value error';
  document.getElementById('coords').textContent = msg;
  document.getElementById('status').innerHTML = '✕ &nbsp;Error';
  document.getElementById('status').style.color = '#e04040';
}

function copyCoords() {
  if (!currentCoords) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentCoords).then(() => {
      showCopied();
    }).catch(() => fallbackCopy());
  } else {
    fallbackCopy();
  }
}

function fallbackCopy() {
  const el = document.createElement('textarea');
  el.value = currentCoords;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  showCopied();
}

function showCopied() {
  const btn = document.getElementById('btnCopy');
  btn.textContent = '✓ Copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋   Copy Coordinates';
    btn.classList.remove('copied');
  }, 2000);
}

// Auto-start
getLocation();
</script>
</body>
</html>
