<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono-Passport · ATRC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial Narrow', Arial, sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    background: #1a1a1a;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .top-bar-logo { font-size: 10px; letter-spacing: 3px; color: #666; text-transform: uppercase; }
  .top-bar-logo span { color: #c55a11; }
  .top-bar-title { font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; }
  .back-link { font-size: 11px; letter-spacing: 2px; color: #666; text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .back-link:hover { color: #fff; }

  /* PASSPORT WRAPPER */
  .passport-wrap {
    width: 100%;
    max-width: 860px;
    padding: 40px 24px 64px;
  }

  /* PASSPORT CARD */
  .cp-wrap {
    font-family: 'Arial Narrow', Arial, sans-serif;
    border: 0.5px solid #ccc;
    background: #fff;
    box-shadow: 0 4px 40px rgba(0,0,0,0.10);
  }

  /* HEADER */
  .cp-header {
    background: #111;
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
  }
  .qr-box { background: #fff; padding: 10px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }

  /* TIMELINE */
  .cp-timeline-wrap {
    background: #f9f7f4;
    border-top: 3px solid #111;
    border-bottom: 0.5px solid #ddd;
    padding: 14px 24px 12px;
  }
  .tl-track { display: flex; align-items: center; margin-bottom: 8px; }
  .tl-line { flex: 1; height: 1px; background: #ccc; }
  .tl-labels { display: flex; justify-content: space-between; }
  .tl-lbl { font-size: 9px; color: #999; text-align: center; line-height: 1.4; }
  .tl-lbl.current { color: #c55a11; font-weight: 700; }
  .tl-lbl span { display: block; font-size: 8px; opacity: 0.8; }

  /* SECTIONS */
  .cp-section { display: flex; border-top: 0.5px solid #e0e0e0; }
  .cp-num {
    background: #111; color: #ccc;
    writing-mode: vertical-rl; transform: rotate(180deg);
    padding: 8px 6px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    display: flex; align-items: center; justify-content: center; min-width: 26px;
  }
  .cp-num.ci { color: #4a7c5a; }
  .cp-body { flex: 1; padding: 12px 16px; }
  .cp-label { font-size: 9px; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 8px; }

  /* CARDS */
  .cp-card {
    border-left: 2px solid #ddd;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 6px;
  }
  .cp-card:last-child { margin-bottom: 0; }
  .cp-card:hover { background: #f5f3f0; }
  .cp-card-title { font-size: 10px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .cp-card-sub { font-size: 9px; color: #888; }
  .cp-card-hint { font-size: 9px; color: #bbb; }

  /* CI GRID */
  .cp-ci-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; }
  .cp-ci-box { border: 0.5px solid #e0e0e0; padding: 8px; text-align: center; }
  .cp-ci-val { font-size: 16px; font-weight: 500; color: #1a1a1a; }
  .cp-ci-sub { font-size: 9px; color: #999; margin-top: 2px; }
  .cp-ci-result { border: 1px solid #4a7c5a; padding: 8px 14px; text-align: center; min-width: 80px; }

  /* FOOTER */
  .cp-footer {
    padding: 12px 16px;
    border-top: 0.5px solid #e0e0e0;
    display: flex; justify-content: space-between; align-items: center;
    background: #f9f7f4;
  }

  /* DOWNLOAD ROW */
  .download-row { margin-top: 28px; display: flex; gap: 12px; }
  .btn {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 24px; text-decoration: none;
    border: 1px solid #1a1a1a; color: #1a1a1a;
    transition: background 0.2s, color 0.2s; cursor: pointer; background: transparent;
  }
  .btn:hover { background: #1a1a1a; color: #fff; }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border: 0.5px solid #ccc;
    width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
  }
  .modal-head {
    background: #111; padding: 12px 18px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0;
  }
  .modal-head-title { font-size: 10px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; }
  .modal-close { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: #fff; }
  .modal-body { padding: 18px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title {
    font-size: 9px; letter-spacing: 2px; color: #999; text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px; border-bottom: 0.5px solid #e0e0e0;
  }
  .modal-text { font-size: 11px; color: #1a1a1a; line-height: 1.7; }
  .modal-item {
    font-size: 11px; color: #555; padding: 4px 0;
    border-bottom: 0.5px solid #f0f0f0;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .modal-item:last-child { border-bottom: none; }
  .modal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  /* LOADING / ERROR */
  .state-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 16px;
  }
  .state-title { font-size: 12px; letter-spacing: 3px; color: #999; text-transform: uppercase; }
  .loading-bar { width: 120px; height: 2px; background: #e0e0e0; position: relative; overflow: hidden; }
  .loading-bar::after {
    content: ''; position: absolute; left: -40%; width: 40%; height: 100%;
    background: #c55a11; animation: loading 1s ease-in-out infinite;
  }
  @keyframes loading { to { left: 100%; } }

  @media (max-width: 600px) {
    .top-bar { padding: 12px 20px; }
    .top-bar-title { display: none; }
    .cp-header { grid-template-columns: 1fr auto; }
    .qr-box { display: none; }
    .cp-ci-grid { grid-template-columns: 1fr 1fr; }
  }
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    body { background: #fff; }
    .top-bar, .download-row, .modal-bg { display: none !important; }
    .passport-wrap { padding: 0; }
    .cp-wrap { box-shadow: none; border: 1px solid #ccc; }
    .qr-box { display: flex !important; }
  }
</style>
</head>

<script>
/* ── CONFIG ── */
const REGISTRY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy8xKcJNvAidXuhUzITooZZtzXlyfoxZtX7_q5p7K9iptOtpWNjkV3oyTyDUvmDN4cdR_9JYcvyh2b/pub?gid=1239668298&single=true&output=csv';
// AI Report Interpreter — вызывает WEBAPP_URL, который на сервере обращается
// к Anthropic API (ключ хранится в Script Properties, не в этом файле).
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxWlgW4Iqj6a2mjdO8I0f52XIVT8dqal0YnwM4z0CqJGxFT27SePt-QzFDImhd5QSGr/exec';
const API_SECRET = 'hn-zones-secret-8k3f2m';

/* ── GET ID FROM URL ── */
function getPassportId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || 'CP·ME·BJ·HN·003·0001';
}

/* ── COLOUR SCIENCE ── */
function ciToHex(ci) {
  const wl = 400 + ci * 300;
  let r=0,g=0,b=0;
  if      (wl>=380&&wl<440){r=(440-wl)/(440-380);g=0;b=1;}
  else if (wl<490){r=0;g=(wl-440)/(490-440);b=1;}
  else if (wl<510){r=0;g=1;b=(510-wl)/(510-490);}
  else if (wl<580){r=(wl-510)/(580-510);g=1;b=0;}
  else if (wl<645){r=1;g=(645-wl)/(645-580);b=0;}
  else{r=1;g=0;b=0;}
  let f=1;
  if(wl>=380&&wl<420)f=0.3+0.7*(wl-380)/(420-380);
  else if(wl>=700&&wl<=780)f=0.3+0.7*(780-wl)/(780-700);
  const R=Math.round(255*Math.pow(r*f,0.8));
  const G=Math.round(255*Math.pow(g*f,0.8));
  const B=Math.round(255*Math.pow(b*f,0.8));
  return '#'+[R,G,B].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function ciCategory(ci) {
  if (ci>=0.85) return 'Deep Chronity';
  if (ci>=0.70) return 'High Chronity';
  if (ci>=0.50) return 'Moderate';
  if (ci>=0.30) return 'Low Chronity';
  return 'No Chronity';
}

// Бейдж институционального статуса — показывается только когда PSM реально
// поднимает объект (psm != 1.0). Сплошная рамка = есть PSM_Basis (номер
// решения/ссылка на документ); пунктирная = статус заявлен, но не подтверждён
// документом. См. Appendix J.6.
function psmBadgeHTML(psm, basis, opts) {
  if (!psm || Math.abs(psm - 1.0) < 1e-6) return '';
  const hasBasis = basis && basis.trim().length > 0;
  const dark = opts && opts.dark;
  const border = hasBasis
    ? (dark ? '0.5px solid #c55a11' : '0.5px solid #4a7c5a')
    : '0.5px dashed ' + (dark ? '#888' : '#999');
  const color = hasBasis ? (dark ? '#c55a11' : '#4a7c5a') : (dark ? '#888' : '#999');
  const title = hasBasis ? basis.replace(/"/g,'&quot;') : 'Институциональный статус не подтверждён документом (PSM_Basis не заполнено)';
  return `<span title="${title}" style="display:inline-block;font-size:8px;letter-spacing:0.5px;font-weight:700;padding:1px 5px;border-radius:8px;border:${border};color:${color};margin-left:5px;">PSM ×${psm.toFixed(2)}${hasBasis ? '' : ' ?'}</span>`;
}

/* ── AUTO-GENERATED RECOMMENDATIONS (Variant 1 — from measured data only) ──
   These derive text from AD/II/CI thresholds per Appendix D of the theory
   methodology, adapted for automatic generation from field measurements
   rather than manual architect input. Thresholds are a first working pass —
   refine with field experience. */

function materialProfile(ad) {
  if (ad >= 0.70) return {
    label: 'Type A-dominant · noble ageing',
    color: '#4a7c5a',
    text: `Measured Authenticity Density (AD = ${ad.toFixed(2)}) indicates the visual field is dominated by Type A materials — natural materials that age with dignity (stone with patina, aged wood, weathering metals). This is a positive signal: the object's material biography is intact.`,
    rules: [
      'Do not clean patina with aggressive chemicals, sandblasting, or pressure washing',
      'Do not paint or seal natural stone and weathering metals — this stops the material from breathing and accumulating value',
      'Do not replace aged elements with modern surrogates (plastic, composite panels, unweathered glass) even for "restoration" purposes'
    ]
  };
  if (ad >= 0.50) return {
    label: 'Mixed Type A/B',
    color: '#7a8a4a',
    text: `Measured Authenticity Density (AD = ${ad.toFixed(2)}) indicates a mix of Type A materials (noble ageing) and Type B materials (compatible, moderate temporal potential). The object retains meaningful authenticity but has some neutral or replaced elements.`,
    rules: [
      'Preserve remaining Type A elements — do not chemically clean or replace them',
      'When replacing Type B elements, favour compatible traditional materials (lime plaster, traditional ceramics) over synthetic alternatives',
      'Consider a targeted material audit to identify which specific elements are Type A before any renovation'
    ]
  };
  if (ad >= 0.30) return {
    label: 'Type C-dominant · neutral',
    color: '#a08858',
    text: `Measured Authenticity Density (AD = ${ad.toFixed(2)}) indicates the visual field is dominated by Type C materials — newer materials without strong temporal value, but without aggressive dissonance either. Chronity is present but not yet deeply expressed.`,
    rules: [
      'Any future renovation is an opportunity to raise AD — prefer Type A/B materials for replacements rather than repeating Type C',
      'Avoid introducing Type D materials (plastic, aluminium composite panels, synthetic renders, unweathered glass)',
      'A full material inventory would help identify where targeted upgrades give the most Chronity benefit'
    ]
  };
  return {
    label: 'Type D-dominant · degraded',
    color: '#b05050',
    text: `Measured Authenticity Density (AD = ${ad.toFixed(2)}) indicates the visual field is dominated by Type D materials — anti-temporal materials that degrade without accumulating value (plastic, aluminium composite panels, synthetic renders, unweathered glass).`,
    rules: [
      'Reversal to Type A/B materials should be a priority in any future renovation, budget permitting',
      'Do not add further Type D elements — this actively lowers CI and Authenticity Premium',
      'A detailed material audit is strongly recommended before any intervention is planned'
    ]
  };
}

function transformationProfile(ii) {
  if (ii >= 80) return {
    label: 'High integrity · strict protection',
    color: '#4a7c5a',
    freeLevel: 'Cosmetic changes only (furniture, textiles, planting, lighting within the existing concept)',
    checkLevel: 'Any change to internal layout, partitions, or room function — verify against this passport and, if uncertain, consult an architect before proceeding',
    architectLevel: 'Any change to structure, openings (windows/doors), material interfaces (Shadow Gap), or facade elements — architect oversight required. Measured Integrity Index (II = ' + ii + '/100) indicates temporal layers are exceptionally well preserved; unsupervised structural intervention would cause disproportionate damage to accumulated chronity.'
  };
  if (ii >= 50) return {
    label: 'Moderate integrity',
    color: '#a08858',
    freeLevel: 'Cosmetic changes (furniture, textiles, planting, lighting)',
    checkLevel: 'Layout changes, partition removal or addition — recommended to verify against original material zones before proceeding',
    architectLevel: 'Structural changes, opening modifications, facade work — architect oversight recommended. Measured Integrity Index (II = ' + ii + '/100) indicates partial preservation; some historical layers are already lost, so remaining ones carry proportionally more weight.'
  };
  return {
    label: 'Low integrity · reduced constraints',
    color: '#888',
    freeLevel: 'Cosmetic and most functional changes',
    checkLevel: 'Larger interventions — a quick check is still worthwhile to avoid removing what authentic material remains',
    architectLevel: 'Structural work still benefits from professional oversight, though the constraint is lower. Measured Integrity Index (II = ' + ii + '/100) indicates significant prior loss of temporal layers — this is also the strongest case for a restoration strategy that actively raises II rather than further reducing it.'
  };
}

function tcoDirection(ad) {
  if (ad >= 0.60) {
    return 'Type A/B-dominant materials (AD ≥ 0.60) are associated, in the theoretical TCO model, with roughly 35–40% lower long-term maintenance cost versus surrogate materials, and a growing "Authenticity Premium" on market value from ~year 15 onward — because natural materials use weather (rain, sun) as a free finishing process rather than requiring active cleaning.';
  }
  return 'Type C/D-dominant materials (AD < 0.60) are associated, in the theoretical TCO model, with higher long-term maintenance cost (frequent cleaning, earlier replacement cycles) and no Authenticity Premium on market value. Raising AD through targeted material replacement is the main lever available to shift this object onto a lower-cost trajectory.';
}

function auditJournalText(d) {
  const count = parseInt(d.Audit_Count) || 1;
  const first = d.First_Audit_Date || '—';
  const last  = d.Last_Audit_Date || '—';
  if (count <= 1) {
    return `First measurement recorded ${first}. This is the baseline — no trend data yet. Recommended: repeat measurement at T+5 years to establish whether Chronity is accumulating or degrading.`;
  }
  return `${count} measurements recorded between ${first} and ${last}. See field log (INPUT sheet) for the full history of individual audits and any flagged anomalies.`;
}

/* ── TIMELINE — from first measurement, projecting forward ── */
function buildTimeline(firstAuditDateStr) {
  const now = new Date();
  const first = firstAuditDateStr ? new Date(firstAuditDateStr) : now;
  const firstYear = isNaN(first.getFullYear()) ? now.getFullYear() : first.getFullYear();
  const nowYear = now.getFullYear();
  const tCurrent = Math.max(0, nowYear - firstYear);

  // Standard monitoring horizons ahead of *today*
  const horizons = [5, 10, 25, 50];
  const points = [0, ...(tCurrent > 0 ? [tCurrent] : []), ...horizons.map(h => tCurrent + h)]
    .filter((v, i, arr) => arr.indexOf(v) === i)
    .sort((a,b) => a-b);

  let track = '<div class="tl-track">';
  points.forEach((t,i) => {
    if (i>0) track += '<div class="tl-line"></div>';
    const isCurrent = t === tCurrent;
    const isFirst = i === 0 && t === 0;
    if (isCurrent) track += '<div style="width:11px;height:11px;border-radius:50%;background:#c55a11;flex-shrink:0;"></div>';
    else if (isFirst) track += '<div style="width:8px;height:8px;border-radius:50%;background:#ccc;border:1.5px solid #888;flex-shrink:0;"></div>';
    else track += '<div style="width:7px;height:7px;border-radius:50%;background:#fff;border:1.5px solid #bbb;flex-shrink:0;"></div>';
  });
  track += '</div>';

  let labels = '<div class="tl-labels">';
  points.forEach((t) => {
    const isCurrent = t === tCurrent;
    const cls = isCurrent ? 'tl-lbl current' : 'tl-lbl';
    const yr = firstYear + t;
    const lbl = t === 0 ? 'First audit' : (isCurrent ? 'Today' : `+${t - tCurrent}y`);
    labels += `<div class="${cls}">${lbl}<span>${yr}</span></div>`;
  });
  labels += '</div>';

  return track + labels;
}

/* ── RENDER PASSPORT ── */
function renderPassport(d) {
  const ci     = parseFloat(d.CI_current) || 0;
  const psm    = parseFloat(d.PSM_current) || 1.0;
  const psmBasis = (d.PSM_Basis || '').toString().trim();
  const ad     = parseFloat(d.AD_current) || 0;
  const ii     = parseFloat(d.II_current) || 0;
  const pi     = parseFloat(d.PI_current) || 0;
  const cpId   = d.CP_ID || getPassportId();
  const zoneId = d.Zone_ID || '';
  const lat    = d.GPS_Lat_anchor || '';
  const lon    = d.GPS_Lon_anchor || '';
  const passportURL = `${location.origin}${location.pathname}?id=${encodeURIComponent(cpId)}`;

  const piComp = ((pi/25)*0.40).toFixed(3);
  const adComp = (ad*0.35).toFixed(3);
  const iiComp = ((ii/100)*0.25).toFixed(3);

  const mat = materialProfile(ad);
  const trans = transformationProfile(ii);
  const tcoText = tcoDirection(ad);
  const journal = auditJournalText(d);

  const tCurrentYears = (() => {
    const f = new Date(d.First_Audit_Date);
    if (isNaN(f.getFullYear())) return 0;
    return Math.max(0, new Date().getFullYear() - f.getFullYear());
  })();

  document.getElementById('top-title').textContent = `Chrono-Passport · ${d.Object_Name || cpId}`;

  const html = `
  <div class="cp-wrap">

    <!-- HEADER -->
    <div class="cp-header">
      <div>
        <div style="font-size:9px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:5px;">Architectura Temporis™</div>
        <div style="font-size:22px;font-weight:700;color:#fff;letter-spacing:0.5px;margin-bottom:8px;">Chrono-Passport</div>
        <div style="font-size:12px;color:#c55a11;letter-spacing:1.5px;font-weight:700;margin-bottom:3px;">${cpId}</div>
        ${zoneId ? `<div style="font-size:10px;color:#999;letter-spacing:1px;">Zone: ${zoneId}</div>` : ''}
      </div>
      <div style="display:flex;gap:0;align-items:stretch;">
        <div style="text-align:center;border:0.5px solid #444;padding:10px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div style="font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:2px;">Chronity Index</div>
          <div style="font-size:28px;font-weight:700;color:#fff;line-height:1.1;">${ci.toFixed(3)}</div>
          <div style="font-size:9px;color:#c55a11;letter-spacing:1px;margin-top:2px;">T+${tCurrentYears} · ${ciCategory(ci)}${psmBadgeHTML(psm, psmBasis, {dark:true})}</div>
        </div>
        <div style="background:#fff;border:0.5px solid #444;padding:10px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-left:-0.5px;">
          <div id="qr-render"></div>
          <div style="font-size:7px;letter-spacing:1px;color:#999;text-transform:uppercase;text-align:center;">Scan to verify</div>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="cp-timeline-wrap">${buildTimeline(d.First_Audit_Date)}</div>

    <!-- LEGACY BANNER -->
    ${d._legacy ? `
    <div style="background:#fdf3e0;border-left:3px solid #c55a11;padding:12px 16px;margin:0 0 -1px;font-size:11px;color:#7a5a2a;line-height:1.6;">
      <strong>Pre-Appendix J v2.0 measurement</strong> — ${d._legacyNote}
    </div>` : ''}

    <!-- 1: IDENTITY -->
    <div class="cp-section">

/* ── AI REPORT ── */
async function generateAiReport(cpId) {
  const idleEl  = document.getElementById('ai-report-idle');
  const loadEl  = document.getElementById('ai-report-loading');
  const errEl   = document.getElementById('ai-report-error');
  const textEl  = document.getElementById('ai-report-text');

  idleEl.style.display = 'none';
  errEl.style.display = 'none';
  textEl.style.display = 'none';
  loadEl.style.display = 'block';

  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ secret: API_SECRET, action: 'generateReport', cpId: cpId })
    });
    const json = await res.json();
    loadEl.style.display = 'none';

    if (!json.ok) {
      errEl.textContent = '✗ ' + (json.error || 'Unknown error generating report.');
      errEl.style.display = 'block';
      idleEl.style.display = 'block';
      return;
    }

    textEl.textContent = json.report || '(empty report)';
    textEl.style.display = 'block';
  } catch (err) {
    loadEl.style.display = 'none';
    errEl.textContent = '✗ Network error: ' + err.message;
    errEl.style.display = 'block';
    idleEl.style.display = 'block';
  }
}

/* ── LOAD DATA ── */
function loadPassport() {
  const id = getPassportId();
  const normalizeId = s => String(s).replace(/^'/,'').replace(/[\s·\-.]/g,'').toLowerCase().trim();

  // Особые случаи — реальные полевые замеры, сделанные ДО финализации Appendix J v2.0.
  // Не входят в живой PASSPORT_REGISTRY (не текущий протокол), но это честные данные,
  // не иллюстрация — поэтому у них свой путь рендера с явной пометкой версии методики.
  const legacyMatch = LEGACY_CASES.find(c => normalizeId(c.CP_ID) === normalizeId(id));
  if (legacyMatch) {
    renderPassport(legacyMatch);
    return;
  }

  // Попробуем загрузить из Google Sheets
  // Если GID не настроен — используем демо-данные
  if (REGISTRY_CSV.includes('PASSPORT_REGISTRY_GID')) {
    console.log('PASSPORT_REGISTRY GID not configured — using demo data');
    renderPassport(DEMO);
    return;
  }

  Papa.parse(REGISTRY_CSV + '&t=' + Date.now(), {
    download: true, header: true, skipEmptyLines: true,
    complete(results) {
      const normalId = normalizeId(id);
      const row = results.data.find(r => {
        const rowId = normalizeId(r.CP_ID || '');
        return rowId === normalId;
      });

      if (row) {
        renderPassport(row);
      } else {
        // Паспорт не найден в реестре — покажем, что реально загрузилось, для диагностики
        const foundIds = results.data.map(r => r.CP_ID || '(empty)').filter(Boolean);
        document.getElementById('passport-container').innerHTML = `
          <div class="state-screen">
            <div class="state-title">Passport not found</div>
            <div style="font-size:11px;color:#bbb;letter-spacing:1px;">Looking for: ${id}</div>
            <div style="font-size:10px;color:#ccc;letter-spacing:1px;margin-top:10px;max-width:400px;text-align:center;">
              Loaded ${results.data.length} row(s) from registry. Available IDs:<br>
              ${foundIds.length ? foundIds.map(x => `<code>${x}</code>`).join('<br>') : '(none found — registry may be empty or column header mismatch)'}
            </div>
            <a href="index.html" class="btn" style="margin-top:8px;">← Back to ATRC</a>
          </div>`;
      }
    },
    error() {
      // Ошибка загрузки — показываем демо
      renderPassport(DEMO);
    }
  });
}

loadPassport();
