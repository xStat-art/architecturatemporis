<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono-Passport · ATRC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial Narrow', Arial, sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    background: #1a1a1a;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .top-bar-logo { font-size: 10px; letter-spacing: 3px; color: #666; text-transform: uppercase; }
  .top-bar-logo span { color: #c55a11; }
  .top-bar-title { font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; }
  .back-link { font-size: 11px; letter-spacing: 2px; color: #666; text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .back-link:hover { color: #fff; }

  /* PASSPORT WRAPPER */
  .passport-wrap {
    width: 100%;
    max-width: 860px;
    padding: 40px 24px 64px;
  }

  /* PASSPORT CARD */
  .cp-wrap {
    font-family: 'Arial Narrow', Arial, sans-serif;
    border: 0.5px solid #ccc;
    background: #fff;
    box-shadow: 0 4px 40px rgba(0,0,0,0.10);
  }

  /* HEADER */
  .cp-header {
    background: #111;
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
  }
  .qr-box { background: #fff; padding: 10px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }

  /* TIMELINE */
  .cp-timeline-wrap {
    background: #f9f7f4;
    border-top: 3px solid #111;
    border-bottom: 0.5px solid #ddd;
    padding: 14px 24px 12px;
  }
  .tl-track { display: flex; align-items: center; margin-bottom: 8px; }
  .tl-line { flex: 1; height: 1px; background: #ccc; }
  .tl-labels { display: flex; justify-content: space-between; }
  .tl-lbl { font-size: 9px; color: #999; text-align: center; line-height: 1.4; }
  .tl-lbl.current { color: #c55a11; font-weight: 700; }
  .tl-lbl span { display: block; font-size: 8px; opacity: 0.8; }

  /* SECTIONS */
  .cp-section { display: flex; border-top: 0.5px solid #e0e0e0; }
  .cp-num {
    background: #111; color: #ccc;
    writing-mode: vertical-rl; transform: rotate(180deg);
    padding: 8px 6px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    display: flex; align-items: center; justify-content: center; min-width: 26px;
  }
  .cp-num.ci { color: #4a7c5a; }
  .cp-body { flex: 1; padding: 12px 16px; }
  .cp-label { font-size: 9px; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 8px; }

  /* CARDS */
  .cp-card {
    border-left: 2px solid #ddd;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 6px;
  }
  .cp-card:last-child { margin-bottom: 0; }
  .cp-card:hover { background: #f5f3f0; }
  .cp-card-title { font-size: 10px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .cp-card-sub { font-size: 9px; color: #888; }
  .cp-card-hint { font-size: 9px; color: #bbb; }

  /* CI GRID */
  .cp-ci-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; }
  .cp-ci-box { border: 0.5px solid #e0e0e0; padding: 8px; text-align: center; }
  .cp-ci-val { font-size: 16px; font-weight: 500; color: #1a1a1a; }
  .cp-ci-sub { font-size: 9px; color: #999; margin-top: 2px; }
  .cp-ci-result { border: 1px solid #4a7c5a; padding: 8px 14px; text-align: center; min-width: 80px; }

  /* FOOTER */
  .cp-footer {
    padding: 12px 16px;
    border-top: 0.5px solid #e0e0e0;
    display: flex; justify-content: space-between; align-items: center;
    background: #f9f7f4;
  }

  /* DOWNLOAD ROW */
  .download-row { margin-top: 28px; display: flex; gap: 12px; }
  .btn {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 24px; text-decoration: none;
    border: 1px solid #1a1a1a; color: #1a1a1a;
    transition: background 0.2s, color 0.2s; cursor: pointer; background: transparent;
  }
  .btn:hover { background: #1a1a1a; color: #fff; }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border: 0.5px solid #ccc;
    width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
  }
  .modal-head {
    background: #111; padding: 12px 18px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0;
  }
  .modal-head-title { font-size: 10px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; }
  .modal-close { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: #fff; }
  .modal-body { padding: 18px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title {
    font-size: 9px; letter-spacing: 2px; color: #999; text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px; border-bottom: 0.5px solid #e0e0e0;
  }
  .modal-text { font-size: 11px; color: #1a1a1a; line-height: 1.7; }
  .modal-item {
    font-size: 11px; color: #555; padding: 4px 0;
    border-bottom: 0.5px solid #f0f0f0;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .modal-item:last-child { border-bottom: none; }
  .modal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  /* LOADING / ERROR */
  .state-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 16px;
  }
  .state-title { font-size: 12px; letter-spacing: 3px; color: #999; text-transform: uppercase; }
  .loading-bar { width: 120px; height: 2px; background: #e0e0e0; position: relative; overflow: hidden; }
  .loading-bar::after {
    content: ''; position: absolute; left: -40%; width: 40%; height: 100%;
    background: #c55a11; animation: loading 1s ease-in-out infinite;
  }
  @keyframes loading { to { left: 100%; } }

  @media (max-width: 600px) {
    .top-bar { padding: 12px 20px; }
    .top-bar-title { display: none; }
    .cp-header { grid-template-columns: 1fr auto; }
    .qr-box { display: none; }
    .cp-ci-grid { grid-template-columns: 1fr 1fr; }
  }
  @media print {
    body { background: #fff; }
    .top-bar, .download-row, .modal-bg { display: none !important; }
    .passport-wrap { padding: 0; }
    .cp-wrap { box-shadow: none; border: 1px solid #ccc; }
    .qr-box { display: flex !important; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-bar-logo">AT<span>RC</span> · Architectura Temporis Research Centre</span>
  <span class="top-bar-title" id="top-title">Chrono-Passport</span>
  <a href="index.html" class="back-link">← Back</a>
</div>

<div class="passport-wrap">
  <div id="passport-container">
    <div class="state-screen">
      <div class="state-title">Loading passport data</div>
      <div class="loading-bar"></div>
    </div>
  </div>
  <div class="download-row" id="download-row" style="display:none;">
    <button class="btn" onclick="window.print()">Print / Save PDF</button>
    <a href="index.html" class="btn">← Back to ATRC</a>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const REGISTRY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEvYYY_XY88tuVBOXk2FYHabWAOLXZwSsvil5VD6_oZRdP1lm2YNSUt8eTQhn0kwq-61_c5BnOzqv9/pub?gid=1404791980&single=true&output=csv';

/* ── GET ID FROM URL ── */
function getPassportId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || 'CP-IT-VE-MB-002-0001';
}

/* ── COLOUR SCIENCE ── */
function ciToHex(ci) {
  const wl = 400 + ci * 300;
  let r=0,g=0,b=0;
  if      (wl>=380&&wl<440){r=(440-wl)/(440-380);g=0;b=1;}
  else if (wl<490){r=0;g=(wl-440)/(490-440);b=1;}
  else if (wl<510){r=0;g=1;b=(510-wl)/(510-490);}
  else if (wl<580){r=(wl-510)/(580-510);g=1;b=0;}
  else if (wl<645){r=1;g=(645-wl)/(645-580);b=0;}
  else{r=1;g=0;b=0;}
  let f=1;
  if(wl>=380&&wl<420)f=0.3+0.7*(wl-380)/(420-380);
  else if(wl>=700&&wl<=780)f=0.3+0.7*(780-wl)/(780-700);
  const R=Math.round(255*Math.pow(r*f,0.8));
  const G=Math.round(255*Math.pow(g*f,0.8));
  const B=Math.round(255*Math.pow(b*f,0.8));
  return '#'+[R,G,B].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function ciCategory(ci) {
  if (ci>=0.85) return 'Deep Chronity';
  if (ci>=0.70) return 'High Chronity';
  if (ci>=0.50) return 'Moderate';
  if (ci>=0.30) return 'Low Chronity';
  return 'No Chronity';
}

/* ── TIMELINE ── */
function buildTimeline(yearBuilt) {
  const yearNow  = new Date().getFullYear();
  const tCurrent = yearNow - yearBuilt;
  const milestones = [10,25,50,75,100].filter(t => t < tCurrent);
  const points = [0, ...milestones, tCurrent];

  let track = '<div class="tl-track">';
  points.forEach((t,i) => {
    if (i>0) track += '<div class="tl-line"></div>';
    const isLast  = i === points.length-1;
    const isFirst = i === 0;
    if (isFirst)     track += '<div style="width:8px;height:8px;border-radius:50%;background:#ccc;border:1.5px solid #888;flex-shrink:0;"></div>';
    else if (isLast) track += '<div style="width:11px;height:11px;border-radius:50%;background:#c55a11;flex-shrink:0;"></div>';
    else             track += '<div style="width:7px;height:7px;border-radius:50%;background:#fff;border:1.5px solid #bbb;flex-shrink:0;"></div>';
  });
  track += '</div>';

  let labels = '<div class="tl-labels">';
  points.forEach((t,i) => {
    const isLast = i === points.length-1;
    const cls = isLast ? 'tl-lbl current' : 'tl-lbl';
    labels += `<div class="${cls}">T+${t}<span>${yearBuilt+t}</span></div>`;
  });
  labels += '</div>';

  return track + labels;
}

/* ── RENDER PASSPORT ── */
function renderPassport(d) {
  const ci     = parseFloat(d.CI) || 0;
  const ad     = parseFloat(d.AD) || 0;
  const ii     = parseFloat(d.II) || 0;
  const pi     = parseFloat(d.PI) || 0;
  const yr     = parseInt(d.Year_built) || 1900;
  const tPlus  = new Date().getFullYear() - yr;
  const cpId   = d.CP_ID || getPassportId();
  const czId   = d.CZ_ID || '';
  const ciHex  = ciToHex(ci);
  const passportURL = `${location.origin}${location.pathname}?id=${encodeURIComponent(cpId)}`;

  const piComp = ((pi/25)*0.40).toFixed(3);
  const adComp = (ad*0.35).toFixed(3);
  const iiComp = ((ii/100)*0.25).toFixed(3);

  document.getElementById('top-title').textContent = `Chrono-Passport · ${d.Object_name || cpId}`;

  const html = `
  <div class="cp-wrap">

    <!-- HEADER -->
    <div class="cp-header">
      <div>
        <div style="font-size:9px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:5px;">Architectura Temporis™</div>
        <div style="font-size:22px;font-weight:700;color:#fff;letter-spacing:0.5px;margin-bottom:8px;">Chrono-Passport</div>
        <div style="font-size:12px;color:#c55a11;letter-spacing:1.5px;font-weight:700;margin-bottom:3px;">${cpId}</div>
        ${czId ? `<div style="font-size:10px;color:#999;letter-spacing:1px;">Zone: ${czId}</div>` : ''}
      </div>
      <div style="display:flex;gap:0;align-items:stretch;">
        <div style="text-align:center;border:0.5px solid #444;padding:10px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div style="font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:2px;">Chronity Index</div>
          <div style="font-size:28px;font-weight:700;color:#fff;line-height:1.1;">${ci.toFixed(3)}</div>
          <div style="font-size:9px;color:#c55a11;letter-spacing:1px;margin-top:2px;">T+${tPlus} · ${ciCategory(ci)}</div>
        </div>
        <div style="background:#fff;border:0.5px solid #444;padding:10px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-left:-0.5px;">
          <div id="qr-render"></div>
          <div style="font-size:7px;letter-spacing:1px;color:#999;text-transform:uppercase;text-align:center;">Scan to verify</div>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="cp-timeline-wrap">${buildTimeline(yr)}</div>

    <!-- 1: IDENTITY -->
    <div class="cp-section">
      <div class="cp-num">1</div>
      <div class="cp-body">
        <div class="cp-label">Identity &amp; Internal Eidos</div>
        <div style="font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px;">${d.Object_name || '—'} · ${d.Location || '—'}</div>
        <div style="font-size:11px;color:#666;margin-bottom:10px;">${d.Architect || '—'} · ${yr} · Heritage ${d.Heritage || '—'}</div>
        ${d.Internal_Eidos ? `
        <div class="cp-card" onclick="openModal('eidos')" style="border-left-color:#c55a11;">
          <div class="cp-card-title"><span style="font-style:italic;">«${d.Internal_Eidos.substring(0,60)}...»</span><span class="cp-card-hint">↗ details</span></div>
          <div class="cp-card-sub">Internal Eidos · PI ${pi}/25</div>
        </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;">
          <div class="cp-card-title"><span style="color:#bbb;">Internal Eidos — pending</span></div>
          <div class="cp-card-sub">PI ${pi}/25</div>
        </div>`}
      </div>
    </div>

    <!-- 2: MATERIAL -->
    <div class="cp-section">
      <div class="cp-num">2</div>
      <div class="cp-body">
        <div class="cp-label">Material Biography · AD: ${ad}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${d.Material_Type_A ? `
          <div class="cp-card" onclick="openModal('typeA')" style="border-left-color:#4a7c5a;">
            <div class="cp-card-title">Type A — noble ageing <span class="cp-card-hint">↗</span></div>
            <div class="cp-card-sub">${d.Material_Type_A.substring(0,50)}...</div>
          </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;"><div class="cp-card-title" style="color:#bbb;">Type A — pending</div></div>`}
          ${d.Material_Type_D ? `
          <div class="cp-card" onclick="openModal('typeD')" style="border-left-color:#b05050;">
            <div class="cp-card-title">Type D — degraded <span class="cp-card-hint">↗</span></div>
            <div class="cp-card-sub">${d.Material_Type_D.substring(0,50)}...</div>
          </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;"><div class="cp-card-title" style="color:#bbb;">Type D — not detected</div></div>`}
        </div>
      </div>
    </div>

    <!-- 3: INTERVENTION -->
    <div class="cp-section">
      <div class="cp-num">3</div>
      <div class="cp-body">
        <div class="cp-label">Intervention Protocol · II: ${ii}/100</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          ${d.Leave_Alone ? `
          <div class="cp-card" onclick="openModal('leave')" style="border-left-color:#666;">
            <div class="cp-card-title">Leave alone <span class="cp-card-hint">↗</span></div>
            <div class="cp-card-sub">${d.Leave_Alone.split('·').length} elements</div>
          </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;"><div class="cp-card-title" style="color:#bbb;">Leave alone — pending</div></div>`}
          ${d.Periodic_Care ? `
          <div class="cp-card" onclick="openModal('care')" style="border-left-color:#888858;">
            <div class="cp-card-title">Periodic care <span class="cp-card-hint">↗</span></div>
            <div class="cp-card-sub">${d.Periodic_Care.split('·').length} cycles</div>
          </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;"><div class="cp-card-title" style="color:#bbb;">Periodic care — pending</div></div>`}
          ${d.Prohibited ? `
          <div class="cp-card" onclick="openModal('prohib')" style="border-left-color:#b05050;">
            <div class="cp-card-title">Prohibited <span class="cp-card-hint">↗</span></div>
            <div class="cp-card-sub">${d.Prohibited.split('·').length} interventions</div>
          </div>` : `<div class="cp-card" style="border-left-color:#ddd;cursor:default;"><div class="cp-card-title" style="color:#bbb;">Prohibited — pending</div></div>`}
        </div>
      </div>
    </div>

    <!-- 4: OWNERSHIP ECONOMICS -->
    <div class="cp-section">
      <div class="cp-num">4</div>
      <div class="cp-body">
        <div class="cp-label">Ownership Economics · methodology in development</div>
        <div class="cp-card" onclick="openModal('tco')" style="border-left-color:#bbb;">
          <div class="cp-card-title"><span>TCO analysis — Type A strategy advantage</span><span class="cp-card-hint">↗</span></div>
          <div class="cp-card-sub">Long-term economic data accumulating across ATRC passport database</div>
        </div>
      </div>
    </div>

    <!-- CI -->
    <div class="cp-section">
      <div class="cp-num ci">CI</div>
      <div class="cp-body">
        <div class="cp-label">Chronity Index · auto-updated from field data</div>
        <div class="cp-ci-grid">
          <div class="cp-ci-box">
            <div class="cp-ci-sub">PI component</div>
            <div class="cp-ci-val">${piComp}</div>
            <div class="cp-ci-sub">${pi}/25 × 0.40</div>
          </div>
          <div class="cp-ci-box">
            <div class="cp-ci-sub">AD component</div>
            <div class="cp-ci-val">${adComp}</div>
            <div class="cp-ci-sub">${ad} × 0.35</div>
          </div>
          <div class="cp-ci-box">
            <div class="cp-ci-sub">II component</div>
            <div class="cp-ci-val">${iiComp}</div>
            <div class="cp-ci-sub">${ii}/100 × 0.25</div>
          </div>
          <div class="cp-ci-result">
            <div class="cp-ci-sub" style="color:#4a7c5a;">CI</div>
            <div style="font-size:24px;font-weight:700;color:#1a1a1a;line-height:1.1;">${ci.toFixed(3)}</div>
            <div class="cp-ci-sub" style="color:#4a7c5a;">${ciCategory(ci)}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="cp-footer">
      <div style="font-size:9px;color:#999;line-height:1.8;">
        <div>Sergei Tatarnikov · ATRC · Herceg Novi · ${new Date().getFullYear()}</div>
        <div>First issue · T+${tPlus} · ${d.Next_audit ? `Next audit: ${d.Next_audit}` : ''} ${d.Projected_CI ? `· Projected CI: ${d.Projected_CI}` : ''}</div>
        <div style="margin-top:2px;font-size:8px;color:#bbb;">Last updated: ${d.Last_measured || '—'}</div>
      </div>
      <div style="background:#111;padding:5px 12px;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px;">AT™</div>
    </div>

  </div>`;

  document.getElementById('passport-container').innerHTML = html;
  document.getElementById('download-row').style.display = 'flex';

  // QR код
  new QRCode(document.getElementById('qr-render'), {
    text: passportURL,
    width: 84, height: 84,
    colorDark: '#111111', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Сохраняем данные для модальных окон
  window._passportData = d;
}

/* ── MODAL ── */
function openModal(key) {
  const d = window._passportData || {};
  const MODALS = {
    eidos: {
      title: 'Identity & Internal Eidos',
      html: `
        <div class="modal-section">
          <div class="modal-section-title">Internal Eidos</div>
          <div class="modal-text" style="font-style:italic;border-left:2px solid #c55a11;padding-left:10px;">«${d.Internal_Eidos || '—'}»</div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">PI · ${d.PI || '—'} / 25</div>
          <div class="modal-text" style="color:#666;">Perceptual Index — aggregated sensory measurement from field data</div>
        </div>`
    },
    typeA: {
      title: 'Material Biography · Type A',
      html: `
        <div class="modal-section">
          <div class="modal-section-title">Type A — noble ageing</div>
          <div class="modal-text" style="margin-bottom:10px;">Materials that improve with time. Patina is a feature, not a defect.</div>

/* ── LOAD DATA ── */
function loadPassport() {
  const id = getPassportId();

  // Попробуем загрузить из Google Sheets
  // Если GID не настроен — используем демо-данные
  if (REGISTRY_CSV.includes('PASSPORT_REGISTRY_GID')) {
    console.log('PASSPORT_REGISTRY GID not configured — using demo data');
    renderPassport(DEMO);
    return;
  }

  Papa.parse(REGISTRY_CSV, {
    download: true, header: true, skipEmptyLines: true,
    complete(results) {
      const normalizeId = s => s.replace(/[\s·\-.]/g,'').toLowerCase(); const normalId = normalizeId(id);
      const row = results.data.find(r => {
        const rowId = normalizeId(r.CP_ID || '');
        return rowId === normalId;
      });

      if (row) {
        renderPassport(row);
      } else {
        // Паспорт не найден в реестре
        document.getElementById('passport-container').innerHTML = `
          <div class="state-screen">
            <div class="state-title">Passport not found</div>
            <div style="font-size:11px;color:#bbb;letter-spacing:1px;">ID: ${id}</div>
            <a href="index.html" class="btn" style="margin-top:8px;">← Back to ATRC</a>
          </div>`;
      }
    },
    error() {
      // Ошибка загрузки — показываем демо
      renderPassport(DEMO);
    }
  });
}
