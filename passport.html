      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;

    .svg-container svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .download-row {
      margin-top: 32px;
      display: flex;
      gap: 16px;
    }
    .btn {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 12px 28px;
      text-decoration: none;
      border: 1px solid #1a1a1a;
      color: #1a1a1a;
      transition: background 0.2s, color 0.2s;
