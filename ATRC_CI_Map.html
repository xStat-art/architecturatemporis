<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATRC Spectral CI Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --panel-2:#1c1c1c; --line:#2a2a2a;
    --text:#f2f0ec; --muted:#9a958c; --orange:#c8650a; --orange-bright:#e8791a;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
  #map{position:fixed;inset:0;z-index:1;background:#e9e6df;}
  .leaflet-control-attribution{display:none !important;}

  .top-bar{
    position:fixed;top:0;left:0;right:0;z-index:500;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;pointer-events:none;
    background:linear-gradient(180deg, rgba(10,10,10,.85), rgba(10,10,10,0));
  }
  .brand{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#cfcac0;font-weight:600;}
  .brand b{color:#fff;}
  .live-pill{
    pointer-events:auto;display:flex;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:6px 12px;font-size:11px;color:var(--muted);
  }
  .live-dot{width:6px;height:6px;border-radius:50%;background:#3a8a4a;animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,138,74,.5);}70%{box-shadow:0 0 0 7px rgba(58,138,74,0);}100%{box-shadow:0 0 0 0 rgba(58,138,74,0);}}

  .legend{
    position:fixed;left:18px;bottom:18px;z-index:500;
    background:rgba(20,20,20,.92);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;backdrop-filter:blur(6px);
  }
  .legend h3{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 8px;}
  .legend-bar{width:200px;height:10px;border-radius:5px;
    background:linear-gradient(90deg, rgb(255,0,0), rgb(255,255,0), rgb(0,255,0), rgb(0,255,255), rgb(0,0,255));
  }
  .legend-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;}

  .toggle-row{
    position:fixed;right:18px;top:62px;z-index:500;
    display:flex;flex-direction:column;gap:8px;
  }
  .toggle-btn{
    background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 12px;border-radius:8px;font-size:11px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .toggle-btn.active{border-color:var(--orange);color:var(--orange-bright);}

  .stats-pill{
    position:fixed;right:18px;bottom:18px;z-index:500;
    background:rgba(20,20,20,.92);border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;font-size:11px;color:var(--muted);text-align:right;
  }
  .stats-pill b{color:var(--text);font-size:13px;}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:8px;}
  .leaflet-popup-tip{background:var(--panel);}
  .popup-title{font-weight:700;font-size:13px;margin-bottom:4px;}
  .popup-id{font-family:monospace;font-size:10px;color:var(--muted);margin-bottom:6px;}
  .popup-ci{font-size:12px;}
  .popup-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--orange-bright);text-decoration:none;font-weight:600;}

  #idwCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:400;}
</style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
  <div class="brand">ATRC <b>Spectral CI Map</b></div>
  <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">Live · updates every 60s</span></div>
</div>

<div class="toggle-row">
  <div class="toggle-btn active" id="idwToggle">◆ IDW gradient</div>
  <div class="toggle-btn" id="pointsToggle">● Points only</div>
</div>

<div class="legend">
  <h3>Chronity Index (spectral)</h3>
  <div class="legend-bar"></div>
  <div class="legend-labels"><span>0.0</span><span>0.25</span><span>0.5</span><span>0.75</span><span>1.0</span></div>
</div>

<div class="stats-pill">
  <div><b id="statObjects">–</b> objects</div>
  <div><b id="statZones">–</b> zones</div>
  <div><b id="statAvg">–</b> avg CI</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ====================== CONFIG ====================== */
const MAP_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy8xKcJNvAidXuhUzITooZZtzXlyfoxZtX7_q5p7K9iptOtpWNjkV3oyTyDUvmDN4cdR_9JYcvyh2b/pub?gid=67053185&single=true&output=csv";
const ZONES_GEOJSON_URL = "zones.geojson";
const REFRESH_MS = 60000;
const IDW_POWER = 2;
const IDW_GRID_STEP = 6; // px — lower = smoother but slower

/* ====================== MAP INIT ====================== */
const map = L.map('map', { zoomControl:false }).setView([42.4531, 18.5375], 15);
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains:'abcd'
}).addTo(map);

/* ====================== IDW CANVAS OVERLAY ====================== */
const canvas = document.createElement('canvas');
canvas.id = 'idwCanvas';
map.getContainer().appendChild(canvas);
const ctx = canvas.getContext('2d');
let idwEnabled = true;

function resizeCanvas(){
  const size = map.getSize();
  canvas.width = size.x;
  canvas.height = size.y;
  canvas.style.width = size.x + 'px';
  canvas.style.height = size.y + 'px';
  drawIdwLayer();
}
map.on('resize move zoom zoomend moveend', drawIdwLayer);
map.on('resize', resizeCanvas);

/* ====================== HELPERS ====================== */
function ciToColor(ci){
  ci = Math.max(0, Math.min(1, ci || 0));
  const wl = 400 + ci * 300;
  return wavelengthToRgbArr(wl);
}
function wavelengthToRgbArr(wl){
  let r,g,b;
  if(wl>=380&&wl<440){r=-(wl-440)/(440-380);g=0;b=1;}
  else if(wl>=440&&wl<490){r=0;g=(wl-440)/(490-440);b=1;}
  else if(wl>=490&&wl<510){r=0;g=1;b=-(wl-510)/(510-490);}
  else if(wl>=510&&wl<580){r=(wl-510)/(580-510);g=1;b=0;}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/(645-580);b=0;}
  else if(wl>=645&&wl<=780){r=1;g=0;b=0;}
  else{r=0;g=0;b=0;}
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}
function rgbToCss([r,g,b], a){ return `rgba(${r},${g},${b},${a})`; }

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const headers = splitCsvLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim().length).map(line=>{
    const cells = splitCsvLine(line);
    const row = {};
    headers.forEach((h,i)=>row[h.trim()] = (cells[i]||'').trim());
    return row;
  });
}
function splitCsvLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===',' && !inQ){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}
function parseGPS(str){
  if(!str) return null;
  const parts = str.split(',').map(s=>parseFloat(s.trim()));
  if(parts.length<2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  return { lat: parts[0], lng: parts[1] };
}
function pointInPolygonScreen(px, py, screenRing){
  let inside = false;
  for(let i=0,j=screenRing.length-1;i<screenRing.length;j=i++){
    const xi=screenRing[i].x, yi=screenRing[i].y, xj=screenRing[j].x, yj=screenRing[j].y;
    const intersect = ((yi>py)!=(yj>py)) && (px < (xj-xi)*(py-yi)/((yj-yi)||1e-12)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}

/* ====================== STATE ====================== */
let objects = [];
let zonePolys = []; // {zn_id, ring:[[lng,lat]], name}
let markers = [];

/* ====================== DATA LOAD ====================== */
function loadData(){
  fetch(MAP_CSV).then(r=>r.text()).then(text=>{
    const rows = parseCSV(text);
    objects = rows.map(r=>{
      const gpsRaw = r['GPS coordinates'] || r.GPS || '';
      const gps = parseGPS(gpsRaw);
      if(!gps) return null;
      return {
        cpId: r.CP_ID || '',
        name: r['Object name'] || r.Object_name || 'Unnamed object',
        ci: parseFloat(r.CI) || 0,
        zn_id: r.ZN_ID || '',
        lat: gps.lat, lng: gps.lng
      };
    }).filter(Boolean);

    renderMarkers();
    updateStats();
    drawIdwLayer();
  }).catch(err=>console.error('CI Map data load failed', err));
}

function loadZones(){
  fetch(ZONES_GEOJSON_URL).then(r=>{ if(!r.ok) throw new Error('no zones.geojson yet'); return r.json(); })
    .then(gj=>{
      zonePolys = (gj.features||[]).map(f=>{
        const ring = f.geometry.type==='Polygon' ? f.geometry.coordinates[0] : f.geometry.coordinates[0][0];
        return { zn_id: f.properties.ZN_ID, name: f.properties.name || f.properties.ZN_ID, ring };
      });
      document.getElementById('statZones').textContent = zonePolys.length;
      drawIdwLayer();
    })
    .catch(()=>{ document.getElementById('statZones').textContent = '0'; });
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];
  objects.forEach(o=>{
    const [r,g,b] = ciToColor(o.ci);
    const marker = L.circleMarker([o.lat,o.lng], {
      radius:7, fillColor:`rgb(${r},${g},${b})`, fillOpacity:1, color:'#0a0a0a', weight:2
    }).addTo(map);
    marker.bindPopup(
      `<div class="popup-title">${o.name}</div>`+
      `<div class="popup-id">${o.cpId || '—'}</div>`+
      `<div class="popup-ci">CI = ${o.ci.toFixed(3)}</div>`+
      (o.cpId ? `<a class="popup-link" href="passport.html?id=${o.cpId}">View Chrono-Passport →</a>` : '')
    );
    markers.push(marker);
  });
}

function updateStats(){
  document.getElementById('statObjects').textContent = objects.length;
  if(objects.length){
    const avg = objects.reduce((s,o)=>s+o.ci,0)/objects.length;
    document.getElementById('statAvg').textContent = avg.toFixed(3);
  }
}

/* ====================== IDW RENDER ====================== */
function drawIdwLayer(){
  if(!ctx) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!idwEnabled || !zonePolys.length || !objects.length) return;

  zonePolys.forEach(zone=>{
    const dominants = objects.filter(o=>o.zn_id === zone.zn_id);
    if(!dominants.length) return;

    const screenRing = zone.ring.map(c=>map.latLngToContainerPoint([c[1], c[0]]));
    const xs = screenRing.map(p=>p.x), ys = screenRing.map(p=>p.y);
    const minX = Math.max(0, Math.floor(Math.min(...xs)));
    const maxX = Math.min(canvas.width, Math.ceil(Math.max(...xs)));
    const minY = Math.max(0, Math.floor(Math.min(...ys)));
    const maxY = Math.min(canvas.height, Math.ceil(Math.max(...ys)));
    if(maxX<=minX || maxY<=minY) return;

    const domScreen = dominants.map(d=>{
      const p = map.latLngToContainerPoint([d.lat,d.lng]);
      return { x:p.x, y:p.y, ci:d.ci };
    });

    for(let py=minY; py<maxY; py+=IDW_GRID_STEP){
      for(let px=minX; px<maxX; px+=IDW_GRID_STEP){
        if(!pointInPolygonScreen(px+IDW_GRID_STEP/2, py+IDW_GRID_STEP/2, screenRing)) continue;

        let weightSum = 0, ciSum = 0, exact = null;
        domScreen.forEach(d=>{
          const dx = px-d.x, dy = py-d.y;
          const distSq = dx*dx + dy*dy;
          if(distSq < 4){ exact = d.ci; return; }
          const w = 1 / Math.pow(distSq, IDW_POWER/2);
          weightSum += w;
          ciSum += w * d.ci;
        });
        const ci = exact != null ? exact : (weightSum > 0 ? ciSum/weightSum : 0);
        const [r,g,b] = ciToColor(ci);
        ctx.fillStyle = rgbToCss([r,g,b], 0.38);
        ctx.fillRect(px, py, IDW_GRID_STEP, IDW_GRID_STEP);
      }
    }

    // subtle outline
    ctx.beginPath();
    screenRing.forEach((p,i)=> i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.strokeStyle = 'rgba(123,79,0,0.55)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

/* ====================== TOGGLES ====================== */
document.getElementById('idwToggle').addEventListener('click', ()=>{
  idwEnabled = true;
  document.getElementById('idwToggle').classList.add('active');
  document.getElementById('pointsToggle').classList.remove('active');
  drawIdwLayer();
});
document.getElementById('pointsToggle').addEventListener('click', ()=>{
  idwEnabled = false;
  document.getElementById('pointsToggle').classList.add('active');
  document.getElementById('idwToggle').classList.remove('active');
  drawIdwLayer();
});

/* ====================== INIT ====================== */
resizeCanvas();
loadZones();
loadData();
setInterval(()=>{ loadData(); loadZones(); }, REFRESH_MS);
</script>
</body>
</html>
