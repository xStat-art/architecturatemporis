<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATRC · Spectral CI Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Turf.js for convex hull -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<!-- PapaParse for CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial', sans-serif;
    background: #0f0f0f;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #1a1a1a;
    border-bottom: 1px solid #444444;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .header-left { display: flex; align-items: baseline; gap: 12px; }
  .logo { font-size: 11px; letter-spacing: 3px; color: #aaaaaa; text-transform: uppercase; }
  .logo span { color: #c55a11; }
  .title { font-size: 13px; letter-spacing: 1px; color: #eeeeee; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 16px; }

  .btn-refresh {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 16px; border: 1px solid #555555; background: transparent;
    color: #aaaaaa; cursor: pointer; transition: all 0.2s;
  }
  .btn-refresh:hover { border-color: #c55a11; color: #c55a11; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #c55a11; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  #map { flex: 1; z-index: 1; }

  .legend {
    position: absolute; bottom: 32px; left: 16px; z-index: 1000;
    background: rgba(20,20,20,0.95); border: 1px solid #444444;
    padding: 16px 20px; min-width: 200px;
  }
  .legend-title { font-size: 9px; letter-spacing: 3px; color: #aaaaaa; text-transform: uppercase; margin-bottom: 12px; }
  .legend-spectrum {
    height: 12px; border-radius: 1px;
    background: linear-gradient(to right, #7B00D4, #0000FF, #00BFFF, #00FF00, #FFFF00, #FF8C00, #FF0000);
    margin-bottom: 6px;
  }
  .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: #aaaaaa; letter-spacing: 1px; margin-bottom: 14px; }
  .legend-items { display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #cccccc; letter-spacing: 1px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .stats {
    position: absolute; top: 70px; right: 16px; z-index: 1000;
    background: rgba(20,20,20,0.95); border: 1px solid #444444;
    padding: 16px 20px; min-width: 180px;
  }
  .stats-title { font-size: 9px; letter-spacing: 3px; color: #aaaaaa; text-transform: uppercase; margin-bottom: 12px; }
  .stats-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 16px; }
  .stats-label { font-size: 10px; color: #aaaaaa; letter-spacing: 1px; }
  .stats-value { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
  .stats-divider { border: none; border-top: 1px solid #444444; margin: 10px 0; }

  .leaflet-popup-content-wrapper {
    background: #1a1a1a; border: 1px solid #555555;
    border-radius: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: #1a1a1a; }
  .popup-content { padding: 4px; min-width: 180px; }
  .popup-name { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: 0.3px; }
  .popup-ci { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -1px; }
  .popup-cat { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #aaaaaa; margin-bottom: 10px; }
  .popup-row { display: flex; justify-content: space-between; font-size: 10px; color: #888888; letter-spacing: 0.5px; margin-bottom: 3px; }
  .popup-row span:last-child { color: #cccccc; }

  .loading-overlay {
    position: absolute; inset: 0; background: rgba(15,15,15,0.9);
    z-index: 2000; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .loading-text { font-size: 10px; letter-spacing: 3px; color: #aaaaaa; text-transform: uppercase; }
  .loading-bar { width: 120px; height: 2px; background: #333333; position: relative; overflow: hidden; }
  .loading-bar::after {
    content: ''; position: absolute; left: -40%; width: 40%; height: 100%;
    background: #c55a11; animation: loading 1s ease-in-out infinite;
  }
  @keyframes loading { to { left: 100%; } }

  .no-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; text-align: center; }
  .no-data-title { font-size: 13px; letter-spacing: 2px; color: #888888; text-transform: uppercase; margin-bottom: 8px; }
  .no-data-sub { font-size: 10px; color: #666666; letter-spacing: 1px; }

  .zone-label {
    background: transparent; border: none; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(255,255,255,0.6); white-space: nowrap; pointer-events: none;
  }

  /* SVG gradient defs container — hidden, just holds <defs> */
  #svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
</style>
</head>
<body>

<!-- Hidden SVG for gradient definitions -->
<svg id="svg-defs" xmlns="http://www.w3.org/2000/svg">
  <defs id="gradient-defs"></defs>
</svg>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">AT<span>RC</span></div>
    <div class="title">Spectral CI Map</div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="map"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">Loading field data</div>
  <div class="loading-bar"></div>
</div>

<div class="stats" id="statsPanel" style="display:none;">
  <div class="stats-title">Zone Summary</div>
  <div class="stats-row">
    <div class="stats-label">CI_zone</div>
    <div class="stats-value" id="statCI">—</div>
  </div>
  <div class="stats-row">
    <div class="stats-label">Category</div>
    <div class="stats-value" style="font-size:11px;color:#aaa;" id="statCat">—</div>
  </div>
  <hr class="stats-divider">
  <div class="stats-row">
    <div class="stats-label">Objects</div>
    <div class="stats-value" id="statCount" style="font-size:18px;">—</div>
  </div>
  <div class="stats-row">
    <div class="stats-label">Min CI</div>
    <div class="stats-value" id="statMin" style="font-size:14px;color:#aaa;">—</div>
  </div>
  <div class="stats-row">
    <div class="stats-label">Max CI</div>
    <div class="stats-value" id="statMax" style="font-size:14px;color:#aaa;">—</div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Chronity Index · Spectral Scale</div>
  <div class="legend-spectrum"></div>
  <div class="legend-labels">
    <span>0.00</span><span>0.25</span><span>0.50</span><span>0.75</span><span>1.00</span>
  </div>
  <div class="legend-items">
    <div class="legend-item"><div class="legend-dot" style="background:#FF0000;"></div><span>0.85–1.00 · Deep Chronity</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF8C00;"></div><span>0.70–0.85 · High Chronity</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFFF00;"></div><span>0.50–0.70 · Moderate</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#00BFFF;"></div><span>0.30–0.50 · Low Chronity</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7B00D4;"></div><span>0.00–0.30 · No Chronity</span></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy8xKcJNvAidXuhUzITooZZtzXlyfoxZtX7_q5p7K9iptOtpWNjkV3oyTyDUvmDN4cdR_9JYcvyh2b/pub?gid=67053185&single=true&output=csv';

const DEMO_DATA = [
  { name: 'Crkva Sv. Mihaila — north', lat: 42.4534, lng: 18.5312, CI: 0.808, ad: 0.80, ii: 75 },
  { name: 'Stara zgrada — east',       lat: 42.4528, lng: 18.5320, CI: 0.743, ad: 0.65, ii: 70 },
  { name: 'Kula Tvrdjava',             lat: 42.4540, lng: 18.5305, CI: 0.821, ad: 0.84, ii: 82 },
  { name: 'Ulica Njegoseva 12',        lat: 42.4522, lng: 18.5330, CI: 0.511, ad: 0.50, ii: 50 },
  { name: 'Nova zgrada — south',       lat: 42.4515, lng: 18.5340, CI: 0.426, ad: 0.40, ii: 35 },
];

/* ── COLOUR SCIENCE ───────────────────────────────────────── */
function wavelengthToRGB(wl) {
  let r=0, g=0, b=0;
  if      (wl >= 380 && wl < 440) { r=(440-wl)/(440-380); g=0; b=1; }
  else if (wl < 490)              { r=0; g=(wl-440)/(490-440); b=1; }
  else if (wl < 510)              { r=0; g=1; b=(510-wl)/(510-490); }
  else if (wl < 580)              { r=(wl-510)/(580-510); g=1; b=0; }
  else if (wl < 645)              { r=1; g=(645-wl)/(645-580); b=0; }
  else if (wl <= 780)             { r=1; g=0; b=0; }
  let factor = 1.0;
  if      (wl >= 380 && wl < 420) factor = 0.3 + 0.7*(wl-380)/(420-380);
  else if (wl >= 700 && wl <= 780) factor = 0.3 + 0.7*(780-wl)/(780-700);
  return [
    Math.round(255 * Math.pow(r*factor, 0.8)),
    Math.round(255 * Math.pow(g*factor, 0.8)),
    Math.round(255 * Math.pow(b*factor, 0.8))
  ];
}

function ciToHex(ci) {
  const wl = 400 + ci * 300;
  const [r,g,b] = wavelengthToRGB(wl);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function ciCategory(ci) {
  if (ci >= 0.85) return '⬛ Deep Chronity';
  if (ci >= 0.70) return '🟫 High Chronity';
  if (ci >= 0.50) return '🟨 Moderate';
  if (ci >= 0.30) return '🟧 Low Chronity';
  return '🟥 No Chronity';
}

/* ── MAP INIT ────────────────────────────────────────────── */
const map = L.map('map', { center: [42.4534, 18.5312], zoom: 15, zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19,
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);
let hullLayer    = L.layerGroup().addTo(map);

/* ── SPECTRAL GRADIENT ZONE ──────────────────────────────── */
/*
  Strategy: for each zone we create a unique SVG radialGradient per object point.
  The hull polygon's SVG <path> gets fill="url(#grad-ZONE_ID)".
  The gradient is a mesh of radial spots — one per object — blended together.
  We use a linearGradient built from points sorted by their projected position
  along the hull's main axis (longest diagonal), giving a smooth spectral sweep.
*/

let gradientCounter = 0;

function buildSpectralGradient(objects, hullLatLngs) {
  const defs = document.getElementById('gradient-defs');
  const gradId = 'ci-grad-' + (++gradientCounter);

  // Project each object onto a 0–1 axis: sort by longitude (west→east = cold→warm typically)
  const lngs = objects.map(o => o.lng);
  const minLng = Math.min(...lngs);
  const maxLng = Math.max(...lngs);
  const range  = maxLng - minLng || 0.0001;

  // Sort objects by longitude to build a left→right gradient
  const sorted = [...objects].sort((a,b) => a.lng - b.lng);

  // Build SVG linearGradient
  const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  grad.setAttribute('id', gradId);
  grad.setAttribute('x1', '0%');
  grad.setAttribute('y1', '0%');
  grad.setAttribute('x2', '100%');
  grad.setAttribute('y2', '0%');
  grad.setAttribute('gradientUnits', 'objectBoundingBox');

  sorted.forEach((obj, i) => {
    const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    const offset = sorted.length === 1
      ? 0.5
      : (obj.lng - minLng) / range;
    stop.setAttribute('offset', (offset * 100).toFixed(1) + '%');
    stop.setAttribute('stop-color', ciToHex(obj.CI));
    stop.setAttribute('stop-opacity', '0.55');
    grad.appendChild(stop);
  });

  // Remove old gradient with same id if exists
  const old = document.getElementById(gradId);
  if (old) old.remove();
  defs.appendChild(grad);

  return gradId;
}

function renderSpectralHull(objects, hullGeoJSON) {
  if (!hullGeoJSON) return;

  const gradId = buildSpectralGradient(objects, []);

  // Convert hull coordinates to LatLng for Leaflet
  const coords = hullGeoJSON.geometry.coordinates[0];
  const latLngs = coords.map(([lng, lat]) => [lat, lng]);

  const avgCI  = objects.reduce((s,o) => s + o.CI, 0) / objects.length;
  const avgHex = ciToHex(avgCI);

  // Custom Leaflet polygon — we inject gradient fill via SVG after render
  const poly = L.polygon(latLngs, {
    fillOpacity: 0,    // transparent — we paint via SVG gradient overlay
    color: avgHex,
    weight: 1.5,
    opacity: 0.6,
    dashArray: '4 4',
  }).addTo(hullLayer);

  // After Leaflet renders the SVG path, patch its fill
  poly.on('add', () => {
    const svgPath = poly.getElement();
    if (svgPath) {
      svgPath.setAttribute('fill', `url(#${gradId})`);
      svgPath.setAttribute('fill-opacity', '0.55');
    }
  });

  // Also patch immediately in case 'add' already fired
  requestAnimationFrame(() => {
    const svgPath = poly.getElement();
    if (svgPath) {
      svgPath.setAttribute('fill', `url(#${gradId})`);
      svgPath.setAttribute('fill-opacity', '0.55');
    }
  });

  // Zone label at centroid
  const center   = turf.centroid(hullGeoJSON);
  const [cLng, cLat] = center.geometry.coordinates;
  L.marker([cLat, cLng], {
    icon: L.divIcon({
      className: 'zone-label',
      html: `<div style="color:${avgHex};font-size:10px;letter-spacing:2px;text-shadow:0 0 8px rgba(0,0,0,0.9);">CI_zone ${avgCI.toFixed(3)}</div>`,
      iconAnchor: [40, 8],
    }),
    interactive: false,
  }).addTo(hullLayer);
}

/* ── PARSE HELPERS ───────────────────────────────────────── */
function parseGPS(text) {
  if (!text || text.trim() === '') return null;
  const parts = text.replace(/\s/g,'').split(',');
  if (parts.length !== 2) return null;
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return { lat, lng };
}

function parseCI(val) {
  if (!val) return null;
  const n = parseFloat(String(val).replace(',','.'));
  if (isNaN(n) || n < 0 || n > 1) return null;
  return Math.round(n * 1000) / 1000;
}

/* ── MAIN RENDER ─────────────────────────────────────────── */
function renderObjects(objects) {
  markersLayer.clearLayers();
  hullLayer.clearLayers();

  // Clear old gradient defs
  document.getElementById('gradient-defs').innerHTML = '';
  gradientCounter = 0;

  if (objects.length === 0) {
    document.getElementById('statsPanel').style.display = 'none';
    const old = document.getElementById('noData');
    if (!old) {
      document.getElementById('map').insertAdjacentHTML('beforeend',
        '<div class="no-data" id="noData"><div class="no-data-title">No field data yet</div><div class="no-data-sub">Submit the form to see objects on the map</div></div>'
      );
    }
    return;
  }

  const old = document.getElementById('noData');
  if (old) old.remove();

  // Build convex hull + spectral gradient zone
  if (objects.length >= 3) {
    const pts  = turf.featureCollection(objects.map(o => turf.point([o.lng, o.lat])));
    const hull = turf.convex(pts);
    if (hull) renderSpectralHull(objects, hull);
  }

  // Object markers
  objects.forEach(obj => {
    const hex = ciToHex(obj.CI);
    const marker = L.circleMarker([obj.lat, obj.lng], {
      radius: 10,
      fillColor: hex,
      color: '#1a1a1a',
      weight: 2,
      fillOpacity: 0.9,
    });
    marker.bindPopup(L.popup({ maxWidth: 220 }).setContent(`
      <div class="popup-content">
        <div class="popup-name">${obj.name || 'Unknown object'}</div>
        <div class="popup-ci" style="color:${hex}">${obj.CI.toFixed(3)}</div>
        <div class="popup-cat">${ciCategory(obj.CI)}</div>
        ${obj.location ? `<div class="popup-row"><span>Location</span><span>${obj.location}</span></div>` : ''}
        ${obj.ad       ? `<div class="popup-row"><span>AD</span><span>${obj.ad}</span></div>` : ''}
        ${obj.ii       ? `<div class="popup-row"><span>II</span><span>${obj.ii}</span></div>` : ''}
        ${obj.date     ? `<div class="popup-row"><span>Measured</span><span>${obj.date}</span></div>` : ''}
      </div>
    `));
    marker.addTo(markersLayer);
  });

  // Stats panel
  const avgCI  = objects.reduce((s,o) => s + o.CI, 0) / objects.length;
  const minCI  = Math.min(...objects.map(o => o.CI));
  const maxCI  = Math.max(...objects.map(o => o.CI));
  const avgHex = ciToHex(avgCI);

  document.getElementById('statCI').textContent    = avgCI.toFixed(3);
  document.getElementById('statCI').style.color    = avgHex;
  document.getElementById('statCat').textContent   = ciCategory(avgCI);
  document.getElementById('statCount').textContent = objects.length;
  document.getElementById('statMin').textContent   = minCI.toFixed(3);
  document.getElementById('statMax').textContent   = maxCI.toFixed(3);
  document.getElementById('statsPanel').style.display = 'block';

  const bounds = L.latLngBounds(objects.map(o => [o.lat, o.lng]));
  map.fitBounds(bounds, { padding: [60, 60] });
}

/* ── DATA LOAD ───────────────────────────────────────────── */
function loadData() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('statusDot').style.background = '#c55a11';

  Papa.parse(CSV_URL, {
    download: true, header: true, skipEmptyLines: true,
    complete: function(results) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('statusDot').style.background = '#4CAF50';

      const objects = [];
      results.data.forEach(row => {
        const gpsRaw  = row['GPS coordinates (if address unknown)'] || '';
        const locRaw  = row['Location / Address'] || '';
        const nameRaw = row['Object name'] || '';

        let coords = parseGPS(gpsRaw);
        if (!coords) coords = parseGPS(locRaw);
        if (!coords) return;

        let ci = null;
        for (const col of ['CI', 'ci', 'Chronity Index', 'CI_zone']) {
          if (row[col]) { ci = parseCI(row[col]); break; }
        }
        if (ci === null) {
          const ad = parseFloat(row['AD — Exact value (if known)'] || row['AD'] || '') || 0.50;
          const ii = parseFloat(row['II — Exact value (if known)'] || row['II'] || '') || 50;
          ci = Math.min(1, Math.max(0, Math.round((ad*0.35 + (ii/100)*0.25 + 0.40*0.5) * 1000) / 1000));
        }

        objects.push({
          name:     nameRaw,
          location: locRaw,
          lat:      coords.lat,
          lng:      coords.lng,
          CI:       ci,
          ad:       row['AD — Exact value (if known)'] || '',
          ii:       row['II — Exact value (if known)'] || '',
          date:     row['Timestamp'] ? row['Timestamp'].split(' ')[0] : '',
        });
      });

      renderObjects(objects.length ? objects : DEMO_DATA);
      if (!objects.length) console.log('No GPS data — showing demo objects');
    },
    error: function(err) {
      console.log('CSV load error, using demo data:', err);
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('statusDot').style.background = '#888';
      renderObjects(DEMO_DATA);
    }
  });
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
