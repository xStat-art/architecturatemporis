<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG — замени на свой Spreadsheet ID
// ═══════════════════════════════════════════════════════════════
const SHEET_ID   = '1mMF9JQscYIhlZYq5tOiZKSJ9zn4PT46W_4CbiEaxeP4';
const SHEET_NAME = 'Form_Responses';
const REGISTRY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTy8xKcJNvAidXuhUzITooZZtzXlyfoxZtX7_q5p7K9iptOtpWNjkV3oyTyDUvmDN4cdR_9JYcvyh2b/pub?gid=1239668298&single=true&output=csv';

// Резервные тестовые данные (если таблица недоступна)
const DEMO_DATA = [
  { cpId: 'CP·DEMO·0001', zoneId: 'ZN·DEMO', name: 'Crkva Sv. Mihaila — north', lat: 42.4534, lng: 18.5312, CI: 0.808, ad: 0.80, ii: 75 },
  { cpId: 'CP·DEMO·0002', zoneId: 'ZN·DEMO', name: 'Stara zgrada — east', lat: 42.4528, lng: 18.5320, CI: 0.743, ad: 0.65, ii: 70 },
  { cpId: 'CP·DEMO·0003', zoneId: 'ZN·DEMO', name: 'Kula Tvrdjava', lat: 42.4540, lng: 18.5305, CI: 0.821, ad: 0.84, ii: 82 },
  { cpId: 'CP·DEMO·0004', zoneId: 'ZN·DEMO', name: 'Ulica Njegoseva 12', lat: 42.4522, lng: 18.5330, CI: 0.511, ad: 0.50, ii: 50 },
  { cpId: 'CP·DEMO·0005', zoneId: 'ZN·DEMO', name: 'Nova zgrada — south', lat: 42.4515, lng: 18.5340, CI: 0.426, ad: 0.40, ii: 35 },
];

// ═══════════════════════════════════════════════════════════════
// SPECTRAL COLOR — CI 0–1 → visible spectrum 400–700nm
// ═══════════════════════════════════════════════════════════════
function wavelengthToRGB(wl) {
  let r=0, g=0, b=0;
  if (wl >= 380 && wl < 440) { r=(440-wl)/(440-380); g=0; b=1; }
  else if (wl < 490) { r=0; g=(wl-440)/(490-440); b=1; }
  else if (wl < 510) { r=0; g=1; b=(510-wl)/(510-490); }
  else if (wl < 580) { r=(wl-510)/(580-510); g=1; b=0; }
  else if (wl < 645) { r=1; g=(645-wl)/(645-580); b=0; }
  else if (wl <= 780) { r=1; g=0; b=0; }

  // Intensity falloff at edges
  let factor = 1.0;
  if (wl >= 380 && wl < 420)      factor = 0.3 + 0.7*(wl-380)/(420-380);
  else if (wl >= 700 && wl <= 780) factor = 0.3 + 0.7*(780-wl)/(780-700);

  return [
    Math.round(255 * Math.pow(r*factor, 0.8)),
    Math.round(255 * Math.pow(g*factor, 0.8)),
    Math.round(255 * Math.pow(b*factor, 0.8))
  ];
}

function ciToColor(ci) {
  const wl = 400 + ci * 300; // CI 0→400nm (violet), CI 1→700nm (red)
  const [r,g,b] = wavelengthToRGB(wl);
  return `rgb(${r},${g},${b})`;
}

function ciToHex(ci) {
  const wl = 400 + ci * 300;
  const [r,g,b] = wavelengthToRGB(wl);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════════════════════
// GRADIENT SIGNATURE — a compact numeric fingerprint of a zone's
// interpolated CI field. Lets AI/analysis compare zones or track
// drift over time without diffing full grids: two snapshots with an
// identical hash are the same pattern; mean/stddev/gradient_magnitude
// give an at-a-glance sense of *how* two different patterns differ
// (more uniform vs more patchy, gentler vs sharper transitions).
// ═══════════════════════════════════════════════════════════════
function fnv1aHash(str) {
  let hash = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 0x01000193);
  }
  return (hash >>> 0).toString(16).padStart(8, '0');
}

function computeGradientSignature(grid, gridSize) {
  const vals = [];
  for (let i = 0; i < gridSize; i++)
    for (let j = 0; j < gridSize; j++)
      if (grid[i][j] !== null) vals.push(grid[i][j]);

  const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
  const variance = vals.reduce((a,b) => a + (b-mean)**2, 0) / vals.length;
  const stddev = Math.sqrt(variance);
  const min = Math.min(...vals), max = Math.max(...vals);

  // Average absolute difference between adjacent grid cells — how
  // "sharp" the transitions are across the zone, not just how spread
  // out the values are overall.
  let gradSum = 0, gradCount = 0;
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      const v = grid[i][j];
      if (v === null) continue;
      if (j+1 < gridSize && grid[i][j+1] !== null) { gradSum += Math.abs(v - grid[i][j+1]); gradCount++; }
      if (i+1 < gridSize && grid[i+1][j] !== null) { gradSum += Math.abs(v - grid[i+1][j]); gradCount++; }
    }
  }
  const gradientMagnitude = gradCount ? gradSum / gradCount : 0;

  // Reproducible fingerprint of the grid itself — identical inputs
  // (same points, same CI values, same grid resolution) always give
  // the same hash. A changed hash between two dated exports of the
  // same zone is the fastest possible signal that something moved.
  const gridStr = vals.map(v => v.toFixed(4)).join(',');
  const hash = fnv1aHash(gridStr);

  return {
    mean: Math.round(mean*1000)/1000,
    stddev: Math.round(stddev*1000)/1000,
    min: Math.round(min*1000)/1000,
    max: Math.round(max*1000)/1000,
    range: Math.round((max-min)*1000)/1000,
    gradient_magnitude: Math.round(gradientMagnitude*10000)/10000,
    hash
  };
}

function ciCategory(ci) {
  if (ci >= 0.85) return '⬛ Deep Chronity';
  if (ci >= 0.70) return '🟫 High Chronity';
  if (ci >= 0.50) return '🟨 Moderate';
  if (ci >= 0.30) return '🟧 Low Chronity';
  return '🟥 No Chronity';
}

// ═══════════════════════════════════════════════════════════════
// GROUP OBJECTS BY ZONE — each zone gets its own gradient + hull
// ═══════════════════════════════════════════════════════════════
function groupByZone(objects) {
  const zones = {};
  objects.forEach(o => {
    const z = o.zoneId || 'UNZONED';
    if (!zones[z]) zones[z] = [];
    zones[z].push(o);
  });
  return zones;
}

// ═══════════════════════════════════════════════════════════════
// IDW INTERPOLATION — builds a smooth CI field across a zone from
// discrete measured points. This grid is the "unique zone gradient":
// exportable, comparable over time, and structured for future ML use
// (see exportGradientSnapshot below).
// ═══════════════════════════════════════════════════════════════
function computeIDWGrid(points, bounds, gridSize, power) {
  power = power || 2;
  const south = bounds.getSouth(), north = bounds.getNorth();
  const west  = bounds.getWest(),  east  = bounds.getEast();
  const grid = [];
  for (let i = 0; i < gridSize; i++) {
    const row = [];
    const lat = south + (north - south) * (i / (gridSize - 1));
    for (let j = 0; j < gridSize; j++) {
      const lng = west + (east - west) * (j / (gridSize - 1));
      let wSum = 0, vSum = 0, exact = null;
      for (const p of points) {
        const d = Math.hypot(p.lat - lat, p.lng - lng);
        if (d < 1e-7) { exact = p.CI; break; }
        const w = 1 / Math.pow(d, power);
        wSum += w; vSum += w * p.CI;
      }
      row.push(exact !== null ? exact : (wSum ? vSum / wSum : null));
    }
    grid.push(row);
  }
  return grid;
}

// Render the IDW grid to a canvas, clipped to the zone's convex hull shape,
// and return a data URL suitable for a Leaflet ImageOverlay.
function renderGradientCanvas(grid, gridSize, hullGeoJSON, bounds) {
  const size = 400;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cell = size / gridSize;

  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      const v = grid[i][j];
      if (v === null) continue;
      ctx.fillStyle = ciToColor(v);
      const x = j * cell;
      const y = size - (i + 1) * cell; // flip: grid row 0 = south, canvas y=0 = north
      ctx.fillRect(x, y - 0.5, cell + 1, cell + 1);
    }
  }

  if (hullGeoJSON) {
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    const coords = hullGeoJSON.geometry.coordinates[0];
    coords.forEach(([lng, lat], idx) => {
      const px = (lng - bounds.getWest())  / (bounds.getEast()  - bounds.getWest())  * size;
      const py = size - (lat - bounds.getSouth()) / (bounds.getNorth() - bounds.getSouth()) * size;
      idx === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  return canvas.toDataURL();
}

// ═══════════════════════════════════════════════════════════════
// GRADIENT SNAPSHOT EXPORT — seeds the future "database of unique
// zone gradients". Each export is a self-contained, dated JSON record:
// the interpolated field + the exact source measurements that produced
// it. Accumulating these over time (one per zone per audit round) is
// what will let future analysis (manual or AI) track how a zone's
// Chronity field evolves, and eventually train on gradient patterns
// across many zones. Not a live database yet — a structured file the
// database can be built from later without re-deriving anything.
// ═══════════════════════════════════════════════════════════════
let lastGridsByZone = {}; // zoneId -> {grid, gridSize, bounds, objects}

function exportGradientSnapshot(zoneId) {
  const rec = lastGridsByZone[zoneId];
  if (!rec) return;
  const avgCI = rec.objects.reduce((s,o) => s + o.CI, 0) / rec.objects.length;

  const signature = computeGradientSignature(rec.grid, rec.gridSize);

  const snapshot = {
    schema_version: '1.1',
    zone_id: zoneId,
    exported_at: new Date().toISOString(),
    ci_zone_avg: Math.round(avgCI * 1000) / 1000,
    signature: signature,
    source_objects: rec.objects.map(o => ({
      cp_id: o.cpId, name: o.name, lat: o.lat, lng: o.lng,
      CI: o.CI, AD: o.ad, II: o.ii, last_audit: o.date || null
    })),
    grid: {
      size: rec.gridSize,
      bounds: {
        south: rec.bounds.getSouth(), north: rec.bounds.getNorth(),
        west: rec.bounds.getWest(),   east: rec.bounds.getEast()
      },
      interpolation: 'IDW', power: 2,
      values: rec.grid // [row][col], null = outside interpolation range
    }
  };

  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `gradient_${zoneId.replace(/[^\w]+/g,'-')}_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
window.exportGradientSnapshot = exportGradientSnapshot;

// ═══════════════════════════════════════════════════════════════

// Dark OSM tiles

let markersLayer  = L.layerGroup().addTo(map);
let hullLayer      = L.layerGroup().addTo(map);

// ═══════════════════════════════════════════════════════════════
// PARSE GPS from text "42.4534, 18.5312" or "42.4534,18.5312"
// ═══════════════════════════════════════════════════════════════
function parseGPS(text) {
  if (!text || text.trim() === '') return null;
  const parts = text.replace(/\s/g,'').split(',');
  if (parts.length !== 2) return null;
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return { lat, lng };
}

// ═══════════════════════════════════════════════════════════════
// PARSE CI from various formats
// ═══════════════════════════════════════════════════════════════
function parseCI(val) {
  if (!val) return null;
  const n = parseFloat(String(val).replace(',','.'));
  if (isNaN(n) || n < 0 || n > 1) return null;
  return Math.round(n * 1000) / 1000;
}

// ═══════════════════════════════════════════════════════════════
// RENDER OBJECTS ON MAP
// ═══════════════════════════════════════════════════════════════
function renderZones(zonesMap) {
  markersLayer.clearLayers();
  hullLayer.clearLayers();
  gradientLayer.clearLayers();
  lastGridsByZone = {};

  const zoneIds = Object.keys(zonesMap);
  const allObjects = zoneIds.flatMap(z => zonesMap[z]);

  if (allObjects.length === 0) {
    document.getElementById('statsPanel').style.display = 'none';
    document.getElementById('map').insertAdjacentHTML('beforeend',
      '<div class="no-data" id="noData"><div class="no-data-title">No field data yet</div><div class="no-data-sub">Submit the form to see objects on the map</div></div>'
    );
    return;
  }

  const old = document.getElementById('noData');
  if (old) old.remove();

  // ── Per-zone: hull + real IDW gradient + export control ────
  zoneIds.forEach(zoneId => {
    const objects = zonesMap[zoneId];
    if (objects.length < 3) return; // need ≥3 points for a hull + meaningful gradient

    const pts = turf.featureCollection(
      objects.map(o => turf.point([o.lng, o.lat], { ci: o.CI }))
    );
    const hull = turf.convex(pts);
    if (!hull) return;

    const avgCI = objects.reduce((s,o) => s + o.CI, 0) / objects.length;
    const color = ciToHex(avgCI);

    // Padded bounds around the hull, so the gradient has room to interpolate
    // before being clipped to the hull outline
    const hullBounds = L.geoJSON(hull).getBounds();
    const bounds = hullBounds.pad(0.35);

    const gridSize = 48;
    const grid = computeIDWGrid(objects, bounds, gridSize, 2);
    const signature = computeGradientSignature(grid, gridSize);
    lastGridsByZone[zoneId] = { grid, gridSize, bounds, objects, signature };

    const dataURL = renderGradientCanvas(grid, gridSize, hull, bounds);
    L.imageOverlay(dataURL, bounds, { opacity: 0.55, interactive: false }).addTo(gradientLayer);

    // Hull outline (thin, on top of the gradient fill)
    L.geoJSON(hull, {
      style: { fillOpacity: 0, color: color, weight: 1.5, opacity: 0.6, dashArray: '4 4' }
    }).addTo(hullLayer);

    // Zone label + signature + export button
    const center = turf.centroid(hull);
    const [cLng, cLat] = center.geometry.coordinates;
    L.marker([cLat, cLng], {
      icon: L.divIcon({
        className: 'zone-label',
        html: `<div style="text-align:center;">
                 <div style="color:${color};font-size:10px;letter-spacing:2px;text-shadow:0 0 8px rgba(0,0,0,0.8);margin-bottom:2px;">CI_zone ${avgCI.toFixed(3)} · ${objects.length} pts</div>
                 <div style="color:rgba(255,255,255,0.55);font-size:8px;letter-spacing:1px;font-family:monospace;text-shadow:0 0 6px rgba(0,0,0,0.9);margin-bottom:4px;">σ ${signature.stddev} · ∇ ${signature.gradient_magnitude} · #${signature.hash}</div>
                 <button onclick="exportGradientSnapshot('${zoneId.replace(/'/g,"\\'")}')" style="pointer-events:auto;font-size:8px;letter-spacing:1px;text-transform:uppercase;background:rgba(20,20,20,0.85);border:1px solid ${color};color:${color};padding:2px 8px;cursor:pointer;">⬇ Export gradient</button>
               </div>`,
        iconAnchor: [60, -6],
        iconSize: [120, 50],
      }),
      interactive: true,
    }).addTo(hullLayer);
  });

  // ── Object markers (all zones) ─────────────────────────────
  allObjects.forEach(obj => {
    const color = ciToColor(obj.CI);
    const hex   = ciToHex(obj.CI);

    const marker = L.circleMarker([obj.lat, obj.lng], {
      radius: 10,
      fillColor: hex,
      color: '#1a1a1a',
      weight: 2,
      fillOpacity: 0.9,
    });

    const popup = L.popup({ maxWidth: 220, className: '' }).setContent(`
      <div class="popup-content">
        <div class="popup-name">${obj.name || 'Unknown object'}</div>
        <div class="popup-ci" style="color:${hex}">${obj.CI.toFixed(3)}</div>
        <div class="popup-cat">${ciCategory(obj.CI)}</div>
        ${obj.cpId ? `<div class="popup-row"><span>ID</span><span>${obj.cpId}</span></div>` : ''}
        ${obj.ad ? `<div class="popup-row"><span>AD</span><span>${obj.ad}</span></div>` : ''}
        ${obj.ii ? `<div class="popup-row"><span>II</span><span>${obj.ii}</span></div>` : ''}
        ${obj.date ? `<div class="popup-row"><span>Measured</span><span>${obj.date}</span></div>` : ''}
      </div>
    `);

    marker.bindPopup(popup);
    marker.addTo(markersLayer);
  });

  // ── Update stats (across all loaded objects) ────────────────
  const avgCI = allObjects.reduce((s,o) => s + o.CI, 0) / allObjects.length;
  const minCI = Math.min(...allObjects.map(o => o.CI));
  const maxCI = Math.max(...allObjects.map(o => o.CI));
  const avgColor = ciToHex(avgCI);

  document.getElementById('statCI').textContent    = avgCI.toFixed(3);
  document.getElementById('statCI').style.color    = avgColor;
  document.getElementById('statCat').textContent   = ciCategory(avgCI);
  document.getElementById('statCount').textContent = allObjects.length;
  document.getElementById('statMin').textContent   = minCI.toFixed(3);
  document.getElementById('statMax').textContent   = maxCI.toFixed(3);
  document.getElementById('statsPanel').style.display = 'block';

  const bounds = L.latLngBounds(allObjects.map(o => [o.lat, o.lng]));
  map.fitBounds(bounds, { padding: [60, 60] });
}

// ═══════════════════════════════════════════════════════════════
// LOAD DATA from Google Sheets CSV
// ═══════════════════════════════════════════════════════════════
function loadData() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('statusDot').style.background = '#c55a11';

  Papa.parse(REGISTRY_CSV + '&t=' + Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('statusDot').style.background = '#4CAF50';

      const rows = results.data;
      const objects = [];

      rows.forEach(row => {
        const lat = parseFloat(row['GPS_Lat_anchor']);
        const lng = parseFloat(row['GPS_Lon_anchor']);
        if (isNaN(lat) || isNaN(lng)) return; // skip rows without valid anchor coords

        const ci = parseCI(row['CI_current']);
        if (ci === null) return; // CI_current is always computed by the pipeline — skip only if truly absent

        objects.push({
          cpId:    row['CP_ID'] || '',
          zoneId:  row['Zone_ID'] || 'UNZONED',
          name:    row['Object_Name'] || 'Unnamed object',
          lat, lng,
          CI:      ci,
          ad:      row['AD_current'] || '',
          ii:      row['II_current'] || '',
          date:    row['Last_Audit_Date'] ? row['Last_Audit_Date'].split(' ')[0] : '',
        });
      });

      if (objects.length === 0) {
        console.log('No valid registry rows, showing demo objects');
        renderZones(groupByZone(DEMO_DATA));
      } else {
        renderZones(groupByZone(objects));
      }
    },
    error: function(err) {
      console.log('CSV load error, using demo data:', err);
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('statusDot').style.background = '#888';
      renderZones(groupByZone(DEMO_DATA));
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadData();

// Auto-refresh every 60 seconds
setInterval(loadData, 60000);
</script>
